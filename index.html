<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎱 GACHA BALL — TEST CONSOLE</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #060810;
    --panel:    #0d1220;
    --border:   #1a2540;
    --accent:   #00f5ff;
    --accent2:  #ff3cac;
    --accent3:  #f5c400;
    --green:    #00ff88;
    --red:      #ff4455;
    --text:     #c8d8f0;
    --dim:      #4a5a7a;
    --glow:     0 0 12px #00f5ff55;
    --glow2:    0 0 12px #ff3cac55;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* scanline overlay */
  body::before {
    content:'';
    position:fixed; inset:0; pointer-events:none; z-index:999;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.08) 2px, rgba(0,0,0,.08) 4px);
  }

  /* animated grid bg */
  body::after {
    content:'';
    position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image:
      linear-gradient(rgba(0,245,255,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,255,.04) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridDrift 20s linear infinite;
  }
  @keyframes gridDrift { to { background-position: 40px 40px; } }

  header {
    position: relative; z-index:1;
    text-align: center;
    padding: 2rem 1rem 1rem;
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1.4rem, 4vw, 2.8rem);
    font-weight: 900;
    letter-spacing: .2em;
    background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    text-shadow: none;
    animation: titlePulse 3s ease-in-out infinite;
  }
  @keyframes titlePulse {
    0%,100% { filter: brightness(1); }
    50%      { filter: brightness(1.3) drop-shadow(0 0 8px #00f5ff88); }
  }
  .subtitle { color: var(--dim); font-size:.75rem; letter-spacing:.3em; margin-top:.4rem; }

  /* API base URL config */
  .config-bar {
    position:relative; z-index:1;
    display:flex; align-items:center; gap:.6rem;
    padding:.7rem 1.5rem;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
  }
  .config-bar label { color: var(--dim); font-size:.75rem; white-space:nowrap; }
  .config-bar input {
    flex:1; background: #0a0f1a; border:1px solid var(--border);
    color: var(--accent); font-family:inherit; font-size:.8rem;
    padding:.4rem .7rem; border-radius:4px; outline:none;
  }
  .config-bar input:focus { border-color: var(--accent); box-shadow: var(--glow); }

  /* main layout */
  .layout {
    position:relative; z-index:1;
    display:grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto;
    gap:1px;
    background: var(--border);
    min-height: calc(100vh - 120px);
  }
  @media(max-width:700px) { .layout { grid-template-columns:1fr; } }

  .panel {
    background: var(--panel);
    padding:1.2rem 1.4rem;
  }
  .panel-full { grid-column: 1 / -1; }

  .panel-title {
    font-family: 'Orbitron', monospace;
    font-size:.7rem; letter-spacing:.25em;
    color: var(--accent); margin-bottom:1rem;
    display:flex; align-items:center; gap:.6rem;
  }
  .panel-title::after {
    content:''; flex:1; height:1px; background: var(--border);
  }

  /* buttons */
  .btn {
    font-family: 'Orbitron', monospace;
    font-size:.65rem; font-weight:700; letter-spacing:.15em;
    border:none; cursor:pointer; border-radius:3px;
    padding:.55rem 1.1rem; transition: all .15s;
    text-transform:uppercase;
  }
  .btn:active { transform: scale(.96); }
  .btn-cyan  { background:#00f5ff22; color:var(--accent);  border:1px solid var(--accent);  }
  .btn-pink  { background:#ff3cac22; color:var(--accent2); border:1px solid var(--accent2); }
  .btn-yellow{ background:#f5c40022; color:var(--accent3); border:1px solid var(--accent3); }
  .btn-red   { background:#ff445522; color:var(--red);     border:1px solid var(--red);     }
  .btn-cyan:hover   { background:#00f5ff33; box-shadow: var(--glow);  }
  .btn-pink:hover   { background:#ff3cac33; box-shadow: var(--glow2); }
  .btn-yellow:hover { background:#f5c40033; box-shadow: 0 0 12px #f5c40055; }
  .btn-red:hover    { background:#ff445533; box-shadow: 0 0 12px #ff445555; }
  .btn:disabled     { opacity:.35; cursor:not-allowed; }

  .btn-row { display:flex; gap:.6rem; flex-wrap:wrap; margin-bottom:1rem; }

  /* status badge */
  .badge {
    display:inline-block; font-size:.65rem; padding:.2rem .5rem;
    border-radius:2px; font-family:'Orbitron',monospace; letter-spacing:.1em;
  }
  .badge-ok  { background:#00ff8822; color:var(--green); border:1px solid #00ff8844; }
  .badge-err { background:#ff445522; color:var(--red);   border:1px solid #ff445544; }
  .badge-dim { background:#1a2540;   color:var(--dim);   border:1px solid var(--border); }

  /* ball count bar */
  .count-bar {
    display:flex; align-items:center; gap:.8rem; margin-bottom:1rem;
  }
  .count-num {
    font-family:'Orbitron',monospace; font-size:2rem; font-weight:900;
    color: var(--accent); line-height:1;
  }
  .count-label { color: var(--dim); font-size:.7rem; }
  .pip-row { display:flex; gap:4px; margin-top:.4rem; }
  .pip {
    width:18px; height:18px; border-radius:50%;
    border:1px solid var(--border); background:#0a0f1a;
    transition: all .3s;
  }
  .pip.filled { background: var(--accent); box-shadow:0 0 6px var(--accent); border-color:var(--accent); }

  /* ball cards */
  .balls-grid {
    display:grid; grid-template-columns: repeat(auto-fill, minmax(180px,1fr)); gap:.7rem;
    max-height: 340px; overflow-y:auto;
  }
  .ball-card {
    background:#0a0f1a; border:1px solid var(--border);
    border-radius:4px; padding:.7rem;
    animation: cardIn .3s ease;
    cursor: default;
    transition: border-color .2s;
  }
  .ball-card:hover { border-color: var(--accent); }
  @keyframes cardIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

  .ball-race {
    font-family:'Orbitron',monospace; font-size:.7rem;
    color: var(--accent2); letter-spacing:.1em; margin-bottom:.4rem;
  }
  .ball-name { color: var(--dim); font-size:.65rem; margin-bottom:.5rem; }
  .stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:2px; }
  .stat-item { font-size:.65rem; color:var(--dim); }
  .stat-item span { color: var(--text); }
  .ball-tags { display:flex; gap:3px; flex-wrap:wrap; margin-top:.5rem; }
  .tag {
    font-size:.55rem; padding:.15rem .35rem; border-radius:2px;
    background:#1a2540; color:var(--dim); border:1px solid var(--border);
  }
  .tag.weapon { color:var(--accent3); border-color:#f5c40033; }
  .tag.skill  { color:var(--green);   border-color:#00ff8833; }
  .tag.gear   { color:var(--accent2); border-color:#ff3cac33; }

  /* combat log */
  .log-box {
    background:#060810; border:1px solid var(--border); border-radius:4px;
    padding:.8rem 1rem; height:320px; overflow-y:auto;
    font-size:.72rem; line-height:1.8;
  }
  .log-box::-webkit-scrollbar { width:4px; }
  .log-box::-webkit-scrollbar-track { background:transparent; }
  .log-box::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  .log-line { animation: logIn .15s ease; }
  @keyframes logIn { from { opacity:0; } to { opacity:1; } }

  .log-hit    { color: var(--text); }
  .log-kill   { color: var(--red); font-weight:bold; }
  .log-parry  { color: var(--accent3); }
  .log-header { color: var(--accent); }
  .log-footer { color: var(--green); font-family:'Orbitron',monospace; font-size:.65rem; }
  .log-sep    { color: var(--border); }
  .log-empty  { color: var(--dim); font-style:italic; }

  /* result banner */
  .result-banner {
    margin-bottom:1rem; padding:.7rem 1rem;
    border-radius:4px; display:none;
    border:1px solid;
  }
  .result-banner.win  { background:#00ff8811; border-color:#00ff8833; color:var(--green); }
  .result-banner.draw { background:#f5c40011; border-color:#f5c40033; color:var(--accent3); }

  .result-winner {
    font-family:'Orbitron',monospace; font-size:.9rem; font-weight:900;
    letter-spacing:.1em;
  }
  .result-reason { font-size:.7rem; margin-top:.2rem; color:var(--dim); }

  /* toast */
  #toast {
    position:fixed; bottom:1.5rem; right:1.5rem; z-index:1000;
    font-family:'Orbitron',monospace; font-size:.65rem; letter-spacing:.1em;
    padding:.6rem 1rem; border-radius:4px; pointer-events:none;
    opacity:0; transform:translateY(8px);
    transition: all .25s;
  }
  #toast.show { opacity:1; transform:none; }
  #toast.ok  { background:#00ff8822; color:var(--green); border:1px solid #00ff8844; }
  #toast.err { background:#ff445522; color:var(--red);   border:1px solid #ff445544; }

  /* spinner */
  .spin {
    display:inline-block; width:10px; height:10px;
    border:2px solid transparent; border-top-color:currentColor;
    border-radius:50%; animation: spinning .6s linear infinite; vertical-align:middle;
  }
  @keyframes spinning { to { transform:rotate(360deg); } }

  .empty-state { color:var(--dim); font-size:.75rem; padding:1rem 0; }
</style>
</head>
<body>

<header>
  <h1>⬡ GACHA BALL CONSOLE ⬡</h1>
  <div class="subtitle">API TEST INTERFACE // LIMBALL ENGINE v1.0</div>
</header>

<div class="config-bar">
  <label>API BASE URL</label>
  <input type="text" id="apiBase" value="https://limball.onrender.com" placeholder="https://your-app.onrender.com">
  <span id="pingBadge" class="badge badge-dim">OFFLINE</span>
</div>

<div class="layout">

  <!-- Panel: Controls -->
  <div class="panel">
    <div class="panel-title">🎲 CONTROLS</div>

    <div class="count-bar">
      <div>
        <div class="count-num" id="ballCount">0</div>
        <div class="count-label">/ 10 BALLS</div>
      </div>
      <div>
        <div class="pip-row" id="pipRow">
          <!-- 10 pips -->
        </div>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-cyan"   id="btnGenerate">⬡ GENERATE BALL</button>
      <button class="btn btn-pink"   id="btnBattle"  >⚔ RANDOM BATTLE</button>
      <button class="btn btn-red"    id="btnReset"   >↺ RESET SESSION</button>
      <button class="btn btn-yellow" id="btnRefresh" >⟳ REFRESH LIST</button>
    </div>

    <div id="statusLine" style="font-size:.7rem; color:var(--dim); min-height:1.2rem;"></div>
  </div>

  <!-- Panel: Balls -->
  <div class="panel">
    <div class="panel-title">📦 SESSION BALLS</div>
    <div class="balls-grid" id="ballsGrid">
      <div class="empty-state">— Chưa có bóng nào. Nhấn GENERATE BALL —</div>
    </div>
  </div>

  <!-- Panel: Combat Log (full width) -->
  <div class="panel panel-full">
    <div class="panel-title">⚔ COMBAT LOG</div>

    <div class="result-banner" id="resultBanner">
      <div class="result-winner" id="resultWinner"></div>
      <div class="result-reason" id="resultReason"></div>
    </div>

    <div class="log-box" id="logBox">
      <span class="log-empty">— Chưa có trận đấu nào. Cần ít nhất 2 bóng rồi nhấn RANDOM BATTLE —</span>
    </div>
  </div>

</div>

<div id="toast"></div>

<script>
// ─── helpers ──────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const API = () => $('apiBase').value.replace(/\/$/, '');

let toastTimer;
function toast(msg, type = 'ok') {
  const el = $('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 2800);
}

function setStatus(msg, color = 'var(--dim)') {
  const el = $('statusLine');
  el.textContent = msg;
  el.style.color = color;
}

async function apiFetch(path, method = 'GET') {
  const res = await fetch(API() + path, {
    method,
    headers: { 'Content-Type': 'application/json' },
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
  return data;
}

// ─── pips ─────────────────────────────────────────────────────────────────────
function renderPips(count) {
  const row = $('pipRow');
  row.innerHTML = '';
  for (let i = 0; i < 10; i++) {
    const d = document.createElement('div');
    d.className = 'pip' + (i < count ? ' filled' : '');
    row.appendChild(d);
  }
  $('ballCount').textContent = count;
}

// ─── ball cards ───────────────────────────────────────────────────────────────
function renderBalls(balls) {
  const grid = $('ballsGrid');
  if (!balls.length) {
    grid.innerHTML = '<div class="empty-state">— Chưa có bóng nào. Nhấn GENERATE BALL —</div>';
    return;
  }
  grid.innerHTML = '';
  balls.forEach(b => {
    const card = document.createElement('div');
    card.className = 'ball-card';
    const s = b.stats;
    const tags = [];
    if (b.weapon) tags.push(`<span class="tag weapon">⚔ ${b.weapon.name}</span>`);
    (b.skills || []).forEach(sk => tags.push(`<span class="tag skill">✦ ${sk.name}</span>`));
    (b.gears  || []).forEach(g  => tags.push(`<span class="tag gear">◈ ${g.name}</span>`));
    card.innerHTML = `
      <div class="ball-race">${b.race?.name || '???'}</div>
      <div class="ball-name">${b.name || b.id?.slice(0,8)}</div>
      <div class="stat-grid">
        <div class="stat-item">ATK <span>${s.ATK}</span></div>
        <div class="stat-item">HP  <span>${s.HP * 10}</span></div>
        <div class="stat-item">SPD <span>${s.SPD}</span></div>
        <div class="stat-item">IQ  <span>${s.IQ}</span></div>
        <div class="stat-item">BIQ <span>${s.BIQ}</span></div>
        <div class="stat-item">MA  <span>${s.MA}</span></div>
      </div>
      <div class="ball-tags">${tags.join('')}</div>
    `;
    grid.appendChild(card);
  });
}

// ─── combat log ───────────────────────────────────────────────────────────────
function classifyLine(line) {
  if (line.includes('══') || line.includes('──')) return 'log-sep';
  if (line.includes('KẾT QUẢ') || line.includes('THẮNG') || line.includes('HÒA')) return 'log-footer';
  if (line.includes('💀'))  return 'log-kill';
  if (line.includes('parry') || line.includes('né') || line.includes('đỡ')) return 'log-parry';
  if (line.includes('vs') || line.includes('ATK=') || line.includes('HP=')) return 'log-header';
  return 'log-hit';
}

function renderLog(lines) {
  const box = $('logBox');
  box.innerHTML = '';
  lines.forEach((line, i) => {
    const el = document.createElement('div');
    el.className = `log-line ${classifyLine(line)}`;
    el.textContent = line;
    el.style.animationDelay = `${Math.min(i * 8, 400)}ms`;
    box.appendChild(el);
  });
  // scroll to bottom
  setTimeout(() => { box.scrollTop = box.scrollHeight; }, 50);
}

// ─── actions ─────────────────────────────────────────────────────────────────
async function refreshBalls() {
  try {
    const data = await apiFetch('/api/balls');
    renderBalls(data.balls);
    renderPips(data.count);
    return data.count;
  } catch(e) { toast('Lỗi tải danh sách: ' + e.message, 'err'); return 0; }
}

$('btnRefresh').onclick = async () => {
  setStatus('Đang tải...', 'var(--accent)');
  await refreshBalls();
  setStatus('Đã cập nhật danh sách.', 'var(--green)');
};

$('btnGenerate').onclick = async () => {
  const btn = $('btnGenerate');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> ROLLING...';
  setStatus('Đang quay Gacha...', 'var(--accent)');
  try {
    const data = await apiFetch('/api/generate', 'POST');
    const b = data.ball;
    toast(`✦ ${b.name} (${b.race?.name}) đã được tạo!`, 'ok');
    setStatus(`Tạo thành công: ${b.name}`, 'var(--green)');
    await refreshBalls();
  } catch(e) {
    toast(e.message, 'err');
    setStatus(e.message, 'var(--red)');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '⬡ GENERATE BALL';
  }
};

$('btnBattle').onclick = async () => {
  const btn = $('btnBattle');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> FIGHTING...';
  setStatus('Đang tính toán trận đấu...', 'var(--accent2)');

  const banner = $('resultBanner');
  banner.style.display = 'none';

  try {
    const data = await apiFetch('/api/battle/random', 'POST');
    renderLog(data.combatLog || []);

    // result banner
    const isDraw = data.winner === 'draw';
    banner.className = `result-banner ${isDraw ? 'draw' : 'win'}`;
    $('resultWinner').textContent = isDraw ? '⚖ HÒA' : `🏆 WINNER: ${data.winner}`;
    $('resultReason').textContent = data.reason;
    banner.style.display = 'block';

    toast(isDraw ? 'Trận đấu hòa!' : `${data.winner} chiến thắng!`, 'ok');
    setStatus(`Trận đấu kết thúc sau ${data.duration?.toFixed(2)}s`, 'var(--green)');
  } catch(e) {
    toast(e.message, 'err');
    setStatus(e.message, 'var(--red)');
    $('logBox').innerHTML = `<span class="log-empty">⚠ ${e.message}</span>`;
  } finally {
    btn.disabled = false;
    btn.innerHTML = '⚔ RANDOM BATTLE';
  }
};

$('btnReset').onclick = async () => {
  if (!confirm('Reset toàn bộ session? Tất cả bóng sẽ bị xóa.')) return;
  try {
    const data = await apiFetch('/api/reset', 'POST');
    toast(data.message, 'ok');
    setStatus('Session đã được reset.', 'var(--dim)');
    renderBalls([]);
    renderPips(0);
    $('resultBanner').style.display = 'none';
    $('logBox').innerHTML = '<span class="log-empty">— Session đã reset. —</span>';
  } catch(e) { toast(e.message, 'err'); }
};

// ─── ping on load & url change ───────────────────────────────────────────────
async function ping() {
  const badge = $('pingBadge');
  badge.textContent = 'CHECKING...';
  badge.className = 'badge badge-dim';
  try {
    const data = await apiFetch('/api/balls');
    badge.textContent = `ONLINE · ${data.count}/10 BALLS`;
    badge.className = 'badge badge-ok';
    renderBalls(data.balls);
    renderPips(data.count);
  } catch(e) {
    badge.textContent = 'OFFLINE';
    badge.className = 'badge badge-err';
  }
}

renderPips(0);
$('apiBase').addEventListener('change', ping);
ping();
</script>
</body>
</html>
