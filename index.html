//  ARENA
// ══════════════════════════════════════════════════════
const arenaCanvas=document.getElementById('arenaCanvas');
const actx=arenaCanvas.getContext('2d');
let arenaW=500,arenaH=500;
let arenaAnimId=null;
let fightRunning=false;

// Fighter state
let fighters=[];
let simProjectiles = []; // Added for projectile system
let arenaTime=0;
let lastFrameTime=0;
let combatLog=[];
let logEl;

const P_COLORS=['#e63946','#2a9d8f'];
const P_COLORS_LIGHT=['#ff6b6b','#4ecdc4'];

function spawnVisualProjectile(attacker, target, cat, dmg) {
  const dx = target.x - attacker.x;
  const dy = target.y - attacker.y;
  const angle = Math.atan2(dy, dx);
  const travelTime = (WEAPON_SCALE[cat]?.travelTime || 0.15) / attacker.projectileSpeedMultiplier;
  const distance = Math.min(Math.hypot(dx, dy), arenaW * 0.8); // Tăng khoảng cách bay
  const speed = (distance / travelTime) * 0.75; // Giảm tốc độ đi nửa
  
  // Vị trí bắt đầu từ vũ khí
  const wepDist = attacker.r * 2.35;
  const startX = attacker.x + Math.cos(angle) * wepDist;
  const startY = attacker.y + Math.sin(angle) * wepDist;
  
  const p = {
    x: startX,
    y: startY,
    vx: (dx / Math.hypot(dx, dy)) * speed,
    vy: (dy / Math.hypot(dy, dx)) * speed,
    tx: target.x,
    ty: target.y,
    attacker: attacker,
    target: target,
    attackerIdx: attacker.idx, // Lưu idx để không tự gây sát thương cho mình
    wCategory: cat,
    weaponName: attacker.weapon?.name || '',
    angle: angle,
    rotation: 0,
    dmg: dmg,
    life: 2.0, // Thời gian sống của đạn (giây)
    progress: 0,
    sizeMultiplier: attacker.projectileSizeMultiplier,
    bounces: 0,
    maxBounces: (cat === CAT.SPECIAL || attacker.weapon?.name?.toLowerCase().includes('shuriken')) ? 1 : 0,
  };
  simProjectiles.push(p);
  
  // Trigger firing state only for bow
  if (cat === CAT.BOW) {
    attacker.isFiring = true;
    attacker.firingTimer = 0.3; // Đứng im 0.3s mỗi lần bắn
  }
}

function initFighters(){
  return players.map((p,i)=>{
    const s=p.stats;
    const ATK=Math.max(1,s.ATK);
    const HP=Math.max(1,s.HP)*HP_MULT;
    const SPD=Math.max(1,s.SPD);
    const IQ=Math.max(0,s.IQ);
    const BIQ=Math.max(1,s.BIQ);
    const MA=Math.max(0,s.MA);
    const armed=p.weapon!==null&&p.weapon!==undefined&&!p._alienNoWeapon;
    const parryRate=armed?0:Math.min(BIQ*0.036,1);

    // weapon mastery effect
    let wepBuff=null;
    if(armed&&p.weapon){
      const mkeys=Object.keys(p.weapon.milestones||{}).map(Number).filter(k=>k<=MA);
      if(mkeys.length) wepBuff=p.weapon.milestones[Math.max(...mkeys)];
    }

    // skill cooldowns
    const skillCDs=p.skills.map(sk=>({
      name:sk.name,effect:sk.effect,
      cd:Math.max(0.5,10-IQ*0.2), // base 10s, reduce 0.2s per IQ
      timer:0,active:false,stacks:0,
    }));

    const r=Math.max(44, arenaW*0.055); // Adjusted for higher resolution
    const sx=i===0?arenaW*0.2:arenaW*0.8;

    const fighter = {
      idx:i,name:p.race,
      char: p, // Keep reference for hooks
      ATK,maxHp:HP,curHp:HP,SPD,IQ,BIQ,MA,
      armed,parryRate,wepBuff,
      skills:skillCDs,
      weapon:p.weapon,
      x:sx,
      y:arenaH/2+((Math.random()-.5)*arenaH*0.25),
      vx:Math.cos(Math.random()*Math.PI*2)*(180+SPD*28),
      vy:Math.sin(Math.random()*Math.PI*2)*(180+SPD*28),
      r,
      accel:1.0,
      wepAngle:i===0?0:Math.PI,
      wepSpeed:Math.PI*(0.55+BIQ*0.14),
      wepDir:(i===0?1:-1),
      bodyHitCooldown:0,
      wepHitCooldown:0,
      wepWepCooldown:0,
      hitFlash:0,
      dmgNumbers:[],
      stunTimer:0,
      spdDebuff:0,
      magmaZones:[],
      trail: [], // For afterimage effect
      dashTimer: 0, // Current dash progress (0 to 1)
      isDashing: false,
      // Weapon scaling state
      extraProjectiles: 0,
      projectileSizeMultiplier: 1.0,
      projectileSpeedMultiplier: 1.0,
      fireRateMultiplier: 1.0,
      autoFireTimer: 0,
      autoFireInterval: 2.5, // Default for magic, will be overwritten
      lastHitTime: 0,
      swordATK: 0,
      daggerBIQ: 0,
      isFiring: false,
      firingTimer: 0,
      polearmATK: 0,
      isDualWielder: p.skills.some(sk => sk.name === 'Dual Wielder'),
    };

    // Set initial auto-fire interval based on weapon
    if(fighter.weapon) {
      const cat = resolveCategory(fighter.weapon);
      if (cat === CAT.BOW) fighter.autoFireInterval = 1.0;
      if (cat === CAT.FIREARM) fighter.autoFireInterval = 0.4;
      if (cat === CAT.MAGIC) fighter.autoFireInterval = 2.0;
    }

    buildHooks(fighter);
    return fighter;
  });
}

function addLog(msg,cls='log-hit'){
  const line=document.createElement('div');
  line.className=cls;line.textContent=msg;
  logEl.appendChild(line);
  if(logEl.children.length>80) logEl.removeChild(logEl.firstChild);
  logEl.scrollTop=logEl.scrollHeight;
}

function updateHUD(){
  fighters.forEach((f,i)=>{
    const pct=Math.max(0,f.curHp/f.maxHp*100);
    document.getElementById('hpBar'+(i+1)).style.width=pct+'%';
    document.getElementById('hpText'+(i+1)).textContent=
      `HP: ${Math.max(0,Math.round(f.curHp))} / ${f.maxHp}`;
  });
}

function dealDamage(attacker,defender,dmg,source=''){
  const def=defender;
  // Parry check
  const actualParryRate = def.armed ? 0 : Math.min(1, def.parryRate + (def._evasionStacks ? def._evasionStacks * 0.1 : 0));
  if(actualParryRate > 0 && Math.random() < actualParryRate){
    addLog(`${def.name} PARRY đòn của ${attacker.name}!`,'log-parry');
    fireParry(def, attacker);
    attacker.accel=def.accel=1.0;
    return;
  }

  // Hook: onDealDamage
  let finalDmg = fireDealDamage(attacker, defender, dmg);

  // Hook: onTakeDamage
  const takeRes = fireTakeDamage(defender, attacker, finalDmg);
  if (takeRes.cancelled) return;
  finalDmg = takeRes.finalDmg;

  addLog(`${attacker.name} → ${defender.name}: -${Math.round(finalDmg)} HP${source?` [${source}]`:''}`,'log-hit');
  
  def.curHp -= finalDmg;

  // Weapon scaling on hit
  const cat = attacker.weapon ? resolveCategory(attacker.weapon) : CAT.UNARMED;
  
  if(cat === CAT.SWORD){
    attacker.swordATK += 1;
    attacker.ATK = Math.max(1, attacker.ATK + 1);
  }
  if(cat === CAT.DAGGER){
    attacker.daggerBIQ += 1;
    attacker.BIQ = Math.max(1, attacker.BIQ + 1);
  }
  if(cat === CAT.POLEARM){
    attacker.polearmATK += 0.5;
    attacker.ATK = Math.max(1, attacker.ATK + 0.5);
  }
  if(cat === CAT.BOW || cat === CAT.FIREARM || (attacker.weapon && attacker.weapon.name.toLowerCase().includes('shuriken'))){
    attacker.extraProjectiles += 1;
    if(cat === CAT.FIREARM){
      attacker.ATK = Math.max(1, attacker.ATK + 1);
      attacker.fireRateMultiplier = Math.max(0.1, attacker.fireRateMultiplier * 0.92);
      attacker.projectileSpeedMultiplier = attacker.projectileSpeedMultiplier * 1.05;
    }
  }
  if(cat === CAT.MAGIC){
    attacker.projectileSizeMultiplier *= 1.08;
    attacker.BIQ = Math.max(1, attacker.BIQ + 1);
  }

  // Reset accel on hit (except for unarmed)
  if(cat !== CAT.UNARMED){
    attacker.accel = 1.0;
    def.accel = 1.0;
  } else {
    // Unarmed: lose speed on hit
    attacker.SPD = Math.max(1, attacker.SPD - 1);
  }

  def.hitFlash=0.25;
  def.dmgNumbers.push({val:Math.round(finalDmg),x:def.x+(Math.random()-.5)*30,y:def.y-def.r,life:1.2,vy:-40});
  
  // Trigger Visual Dash Effect
  attacker.isDashing = true;
  attacker.dashTimer = 1.0;
  def.isDashing = true;
  def.dashTimer = 0.8; // Defender recoils too

  updateHUD();
}

function weaponHitbox(f,foe){
  if(!f.armed) return false;
  const WR=f.r*2.35;
  const wx=f.x+Math.cos(f.wepAngle)*WR;
  const wy=f.y+Math.sin(f.wepAngle)*WR;
  const d=Math.hypot(wx-foe.x,wy-foe.y);
  return d<foe.r+22;  // larger heavier weapon hitbox
}

// Weapon-to-weapon collision check
function weaponVsWeapon(fA,fB){
  if(!fA.armed||!fB.armed) return false;
  const WR=fA.r*1.9;
  const wax=fA.x+Math.cos(fA.wepAngle)*WR, way=fA.y+Math.sin(fA.wepAngle)*WR;
  const WR2=fB.r*1.9;
  const wbx=fB.x+Math.cos(fB.wepAngle)*WR2, wby=fB.y+Math.sin(fB.wepAngle)*WR2;
  return Math.hypot(wax-wbx,way-wby)<22;
}

function drawArena(dt){
  const W=arenaW,H=arenaH;
  actx.clearRect(0,0,W,H);
  // bg — void dark with subtle vignette
  const bg=actx.createRadialGradient(W/2,H/2,0,W/2,H/2,W*.7);
  bg.addColorStop(0,'#0d0916');bg.addColorStop(1,'#05030a');
  actx.fillStyle=bg;actx.fillRect(0,0,W,H);
  // rune grid
  actx.strokeStyle='#3d2e5a18';actx.lineWidth=1;
  for(let x=0;x<W;x+=40){actx.beginPath();actx.moveTo(x,0);actx.lineTo(x,H);actx.stroke();}
  for(let y=0;y<H;y+=40){actx.beginPath();actx.moveTo(0,y);actx.lineTo(W,y);actx.stroke();}

  fighters.forEach((f,fi)=>{
    const foeColor=P_COLORS[fi];

    // ── Afterimage Trails ──
    const speedIntensity = Math.hypot(f.vx, f.vy) / 1000; // Normalized speed
    const trailCount = Math.floor(Math.min(f.trail.length, 3 + speedIntensity * 15));
    
    for (let i = 0; i < trailCount; i++) {
      const pos = f.trail[f.trail.length - 1 - i];
      if (!pos) continue;
      const opacity = (0.4 * (1 - i / trailCount)) * Math.min(1, speedIntensity + 0.2);
      
      actx.save();
      actx.globalAlpha = opacity;
      actx.beginPath();
      actx.arc(pos.x, pos.y, f.r * (1 - i / (trailCount * 1.5)), 0, Math.PI * 2);
      actx.fillStyle = foeColor;
      actx.fill();
      actx.restore();
    }

    // magma zones
    for(const mz of f.magmaZones){
      actx.save();
      actx.globalAlpha=mz.life/5*0.5;
      actx.beginPath();actx.arc(mz.x,mz.y,f.r*2,0,Math.PI*2);
      actx.fillStyle='#ff6b00';actx.fill();
      actx.restore();
    }

    // hit flash
    if(f.hitFlash>0){
      actx.save();actx.globalAlpha=f.hitFlash*0.6;
      actx.beginPath();actx.arc(f.x,f.y,f.r+10,0,Math.PI*2);
      actx.fillStyle='#fff';actx.fill();
      actx.restore();
      f.hitFlash=Math.max(0,f.hitFlash-dt);
    }

    // ball shadow
    actx.save();
    actx.shadowColor=foeColor+'66';actx.shadowBlur=20;
    actx.beginPath();actx.arc(f.x,f.y,f.r,0,Math.PI*2);
    const g=actx.createRadialGradient(f.x-f.r*.3,f.y-f.r*.3,f.r*.1,f.x,f.y,f.r);
    g.addColorStop(0,P_COLORS_LIGHT[fi]);g.addColorStop(1,foeColor);
    actx.fillStyle=g;actx.fill();
    actx.strokeStyle='#fff3';actx.lineWidth=2;actx.stroke();
    actx.restore();

    // HP ring
    const pct=Math.max(0,f.curHp/f.maxHp);
    actx.save();
    actx.beginPath();actx.arc(f.x,f.y,f.r+4,Math.PI*1.5,Math.PI*1.5+Math.PI*2*pct);
    actx.strokeStyle=foeColor;actx.lineWidth=3;actx.lineCap='round';actx.stroke();
    actx.restore();

    // weapon orbiting - ornate styled
    if(f.armed){
      const WR=f.r*2.35;
      const wx=f.x+Math.cos(f.wepAngle)*WR;
      const wy=f.y+Math.sin(f.wepAngle)*WR;
      const cat=(f.weapon?.category||'Sword').toLowerCase();
      const c1=fi===0?'#e9c46a':'#a8dadc';
      const c2=fi===0?'#c8860a':'#2a7d7a';
      actx.save();
      actx.translate(wx,wy);
      actx.rotate(f.wepAngle+Math.PI/4);
      actx.shadowColor=c1;actx.shadowBlur=14;

      if(cat.includes('dagger')){
        actx.scale(1.35,1.35);
        // short wide dagger
        actx.beginPath();actx.moveTo(0,-18);actx.lineTo(5,0);actx.lineTo(0,10);actx.lineTo(-5,0);actx.closePath();
        const dg=actx.createLinearGradient(0,-18,0,10);
        dg.addColorStop(0,'#ffffff');dg.addColorStop(.4,c1);dg.addColorStop(1,c2);
        actx.fillStyle=dg;actx.fill();
        actx.strokeStyle=c2;actx.lineWidth=1.5;actx.stroke();
        // guard
        actx.fillStyle=c2;actx.fillRect(-9,-1,18,4);
        // pommel
        actx.beginPath();actx.arc(0,13,5,0,Math.PI*2);actx.fillStyle=c1;actx.fill();
      } else if(cat.includes('firearm')||cat.includes('bow')){
        // ranged: glow circle + arrow
        actx.beginPath();actx.arc(0,0,10,0,Math.PI*2);
        actx.fillStyle=c1+'44';actx.fill();
        actx.strokeStyle=c1;actx.lineWidth=2;actx.stroke();
        actx.fillStyle=c1;
        actx.beginPath();actx.moveTo(0,-20);actx.lineTo(4,0);actx.lineTo(0,-4);actx.lineTo(-4,0);actx.closePath();
        actx.fill();
      } else {
        // sword/default: long blade with fuller
        // blade
        actx.beginPath();actx.moveTo(0,-28);actx.lineTo(5,2);actx.lineTo(0,8);actx.lineTo(-5,2);actx.closePath();
        const sg=actx.createLinearGradient(-5,0,5,0);
        sg.addColorStop(0,c2);sg.addColorStop(.45,'#ffffff');sg.addColorStop(.55,'#ffffff');sg.addColorStop(1,c2);
        actx.fillStyle=sg;actx.fill();
        actx.strokeStyle=c2+'aa';actx.lineWidth=1;actx.stroke();
        // fuller (groove)
        actx.strokeStyle='#ffffff55';actx.lineWidth=1;
        actx.beginPath();actx.moveTo(0,-24);actx.lineTo(0,2);actx.stroke();
        // crossguard
        const gg=actx.createLinearGradient(-13,2,13,2);
        gg.addColorStop(0,c2);gg.addColorStop(.5,c1);gg.addColorStop(1,c2);
        actx.fillStyle=gg;actx.fillRect(-13,2,26,5);
        actx.strokeStyle=c2;actx.lineWidth=1;actx.strokeRect(-13,2,26,5);
        // grip
        actx.fillStyle='#5c3d1e';actx.fillRect(-3,7,6,14);
        // pommel
        actx.beginPath();actx.arc(0,23,5,0,Math.PI*2);
        actx.fillStyle=c1;actx.fill();
        actx.strokeStyle=c2;actx.lineWidth=1.5;actx.stroke();
      }
      // glow trail
      actx.restore();
      actx.save();actx.globalAlpha=.25;
      actx.beginPath();actx.arc(wx,wy,f.r*.45,0,Math.PI*2);
      actx.fillStyle=c1;actx.fill();actx.restore();
    } else {
      // unarmed: spinning energy fist
      const fx=f.x+Math.cos(f.wepAngle)*f.r*1.5;
      const fy=f.y+Math.sin(f.wepAngle)*f.r*1.5;
      actx.save();
      actx.translate(fx,fy);
      const fg=actx.createRadialGradient(0,0,0,0,0,11);
      fg.addColorStop(0,'#ffffff');fg.addColorStop(.5,foeColor);fg.addColorStop(1,foeColor+'00');
      actx.beginPath();actx.arc(0,0,11,0,Math.PI*2);
      actx.fillStyle=fg;actx.fill();
      // inner spark
      actx.strokeStyle='#fff';actx.lineWidth=1.5;actx.globalAlpha=.7;
      actx.beginPath();actx.moveTo(-5,-5);actx.lineTo(5,5);actx.moveTo(5,-5);actx.lineTo(-5,5);actx.stroke();
      actx.restore();
    }

    // HP label
    const hpPct=Math.max(0,f.curHp/f.maxHp);
    actx.fillStyle=hpPct>.5?'#fff':hpPct>.25?'#ffd':`#f66`;
    actx.font=`bold ${f.r*.5}px 'JetBrains Mono'`;
    actx.textAlign='center';actx.textBaseline='middle';
    actx.fillText(Math.max(0,Math.round(f.curHp)),f.x,f.y);
    actx.textBaseline='alphabetic';

    // stun indicator
    if(f.stunTimer>0){
      actx.font=`${f.r*.4}px sans-serif`;
      actx.textAlign='center';actx.fillText('😵',f.x,f.y-f.r-8);
    }

    // dmg numbers
    f.dmgNumbers=f.dmgNumbers.filter(n=>{
      n.y+=n.vy*dt;n.life-=dt;
      if(n.life<=0) return false;
      actx.save();actx.globalAlpha=Math.min(1,n.life);
      actx.fillStyle='#fff';actx.font=`bold 14px 'JetBrains Mono'`;
      actx.textAlign='center';actx.fillText('-'+n.val,n.x,n.y);
      actx.restore();
      return true;
    });
  });

  // ── Draw Projectiles ──
  simProjectiles.forEach(p => {
    actx.save();
    actx.translate(p.x, p.y);
    actx.rotate(p.angle + p.rotation);
    
    const scale = p.sizeMultiplier || 1;
    actx.scale(scale, scale);

    const color = P_COLORS[p.attacker.idx];
    const lightColor = P_COLORS_LIGHT[p.attacker.idx];

    if (p.wCategory === CAT.BOW) {
      // 🏹 Arrow
      actx.strokeStyle = '#fff';
      actx.lineWidth = 3;
      actx.beginPath();
      actx.moveTo(-15, 0); actx.lineTo(15, 0); // shaft
      actx.moveTo(5, -5); actx.lineTo(15, 0); actx.lineTo(5, 5); // head
      actx.stroke();
      // fletching
      actx.strokeStyle = color;
      actx.beginPath();
      actx.moveTo(-15, 0); actx.lineTo(-20, -4);
      actx.moveTo(-15, 0); actx.lineTo(-20, 4);
      actx.stroke();
    } 
    else if (p.wCategory === CAT.FIREARM) {
      // 🔫 Bullet tracer
      actx.fillStyle = '#ff0';
      actx.shadowBlur = 10;
      actx.shadowColor = '#ff0';
      actx.beginPath();
      actx.rect(-10, -1.5, 20, 3);
      actx.fill();
    }
    else if (p.weaponName.toLowerCase().includes('shuriken')) {
      // 💠 Shuriken (4-point star)
      actx.fillStyle = '#ccc';
      actx.strokeStyle = '#fff';
      actx.lineWidth = 1;
      actx.beginPath();
      for (let i = 0; i < 4; i++) {
        actx.rotate(Math.PI / 2);
        actx.lineTo(12, 0);
        actx.lineTo(3, 3);
      }
      actx.closePath();
      actx.fill();
      actx.stroke();
      // center hole
      actx.beginPath(); actx.arc(0, 0, 2, 0, Math.PI * 2);
      actx.fillStyle = '#111'; actx.fill();
    }
    else if (p.wCategory === CAT.MAGIC) {
      // 🔮 Magic ball
      const grad = actx.createRadialGradient(0, 0, 0, 0, 0, 12);
      grad.addColorStop(0, '#fff');
      grad.addColorStop(0.4, lightColor);
      grad.addColorStop(1, 'transparent');
      actx.fillStyle = grad;
      actx.beginPath();
      actx.arc(0, 0, 12, 0, Math.PI * 2);
      actx.fill();
      // sparkles
      actx.fillStyle = '#fff';
      for (let i = 0; i < 3; i++) {
        const r = 4 + Math.random() * 6;
        const a = Math.random() * Math.PI * 2;
        actx.beginPath();
        actx.arc(Math.cos(a) * r, Math.sin(a) * r, 1.5, 0, Math.PI * 2);
        actx.fill();
      }
    }
    else {
      // fallback: generic dot
      actx.fillStyle = color;
      actx.beginPath(); actx.arc(0, 0, 6, 0, Math.PI * 2); actx.fill();
    }

    actx.restore();
  });
}

function arenaLoop(ts){
  if(!fightRunning) return;
  const dt=Math.min((ts-lastFrameTime)/1000,0.05);
  lastFrameTime=ts;
  arenaTime+=dt;

  const [fA,fB]=fighters;
  const foe=[fB,fA];

  fighters.forEach((f,fi)=>{
    const opponent=foe[fi];
    if(f.curHp<=0) return;

    fireTick(f, opponent, dt, arenaTime);

    // stun
    if(f.stunTimer>0){f.stunTimer-=dt;return;}
    
    // Firing state only for bow
    const currentWepCat = f.weapon ? resolveCategory(f.weapon) : CAT.UNARMED;
    if (f.isFiring && currentWepCat === CAT.BOW) {
      f.firingTimer -= dt;
      if (f.firingTimer <= 0) {
        f.isFiring = false;
      } else {
        // Đứng im: không cập nhật vị trí, chỉ cập nhật vũ khí về hướng địch
        // Đặt góc vũ khí về địch
        f.wepAngle = Math.atan2(opponent.y - f.y, opponent.x - f.x);
        // Bỏ qua các phần movement, drift, v.v.
        // Jump to weapon auto-fire and collision
      }
    } else if (f.isFiring) {
      // Reset isFiring for non-bow weapons
      f.isFiring = false;
    }

    // hit cooldown ticks
    if(f.wepHitCooldown>0) f.wepHitCooldown-=dt;
    if(f.bodyHitCooldown>0) f.bodyHitCooldown-=dt;
    if(f.wepWepCooldown>0)  f.wepWepCooldown-=dt;

    if (!f.isFiring || currentWepCat !== CAT.BOW) {
      // ── Movement (px/s physics) ───────────────────────────────────
      const dx=opponent.x-f.x, dy=opponent.y-f.y;
      const dist=Math.hypot(dx,dy)||1;
      const effSpd=Math.max(1,f.SPD+(f.spdDebuff||0));
      const baseMaxSpd=100+effSpd*20;

      // Dash / Recoil Easing
      if (f.dashTimer > 0) {
        f.dashTimer -= dt * 2.5; // Back to normal in ~0.4s
        if (f.dashTimer < 0) { f.dashTimer = 0; f.isDashing = false; }
      }

      // Constant speed increase (100%/s) except for unarmed
      const cat = f.weapon ? resolveCategory(f.weapon) : CAT.UNARMED;
      if (cat !== CAT.UNARMED) {
        f.accel = Math.min(f.accel + f.accel * 1.0 * dt, 15);
      }

      // Accel also builds when SPD advantage, extra for unarmed
      const spdDiff=Math.max(0,f.SPD-opponent.SPD);
      if (cat === CAT.UNARMED) {
        f.accel=Math.min(f.accel+spdDiff*0.08*dt+0.015*dt, 4.5);
      }

      const curMaxSpd=baseMaxSpd*f.accel;

      // Apply Dash Boost to velocity if dashing
      let dashBoost = 1.0;
      if (f.isDashing) {
        // Cubic easing for "lao lên nhanh, giật lùi từ từ"
        // t=1 is start of dash (hit moment), decays to 0
        // We want a sharp recoil then slow recovery
        dashBoost = 1.0 + Math.pow(f.dashTimer, 2) * 2.0; 
      }

      // Soft pull toward opponent only at long range
      const farThresh=arenaW*0.5;
      if(dist>farThresh){
        const pull=Math.min((dist-farThresh)/arenaW,0.5);
        f.vx+=(dx/dist)*baseMaxSpd*pull*0.08*dt;
        f.vy+=(dy/dist)*baseMaxSpd*pull*0.08*dt;
      }
      // Random drift — chaotic natural movement
      const drift=baseMaxSpd*0.42;
      f.vx+=(Math.random()-.5)*drift*dt;
      f.vy+=(Math.random()-.5)*drift*dt;


      // Anti-stuck safeguard
      if(Math.hypot(f.vx,f.vy)<35){
        const boostA=Math.random()*Math.PI*2;
        f.vx+=Math.cos(boostA)*(80+f.SPD*10);
        f.vy+=Math.sin(boostA)*(80+f.SPD*10);
      }

      // Clamp speed
      const sv=Math.hypot(f.vx,f.vy);
      if(sv>curMaxSpd){ f.vx=f.vx/sv*curMaxSpd; f.vy=f.vy/sv*curMaxSpd; }

      // Integrate position (px/s × s = px) with dash easing
      f.x+=f.vx*dt*dashBoost;
      f.y+=f.vy*dt*dashBoost;

      // Wall elastic bounce
      const pad=f.r;
      if(f.x<pad)        { f.x=pad;        f.vx= Math.abs(f.vx)*0.82; }
      if(f.x>arenaW-pad) { f.x=arenaW-pad; f.vx=-Math.abs(f.vx)*0.82; }
      if(f.y<pad)        { f.y=pad;        f.vy= Math.abs(f.vy)*0.82; }
      if(f.y>arenaH-pad) { f.y=arenaH-pad; f.vy=-Math.abs(f.vy)*0.82; }

      // Record trail for afterimage (at the end of movement)
      f.trail.push({ x: f.x, y: f.y });
      if (f.trail.length > 15) f.trail.shift();

      // ── Weapon spin ────────────────────────────────────────────────
      f.wepSpeed=Math.PI*(0.55+f.BIQ*0.14);
      if( (f.weapon?.category?.toLowerCase().includes('firearm') || f.weapon?.category?.toLowerCase().includes('bow') || f.weapon?.category?.toLowerCase().includes('polearm'))){
        f.wepAngle=Math.atan2(opponent.y-f.y,opponent.x-f.x);
      } else {
        f.wepAngle+=f.wepSpeed*f.wepDir*dt;
      }
    } else if (currentWepCat === CAT.BOW) {
      // When firing bow, point at enemy
      f.wepAngle = Math.atan2(opponent.y - f.y, opponent.x - f.x);
    }

    // ── Auto-fire for ranged weapons ────────────────────────────────────────
    if(f.weapon){
      const wcat = resolveCategory(f.weapon);
      // Apply BIQ scaling to fire rate: +10% per BIQ
      const adjustedFireInterval = f.autoFireInterval * (1 / (1 + f.BIQ * 0.1)) * f.fireRateMultiplier;
      if ((wcat === CAT.BOW || wcat === CAT.FIREARM || wcat === CAT.MAGIC) && f.stunTimer <= 0) {
        f.autoFireTimer += dt;
        if (f.autoFireTimer >= adjustedFireInterval) {
          f.autoFireTimer = 0;
          // Spawn projectile
          spawnVisualProjectile(f, opponent, wcat, f.ATK);
          // Also spawn extra projectiles
          for (let i = 0; i < f.extraProjectiles; i++) {
            // Add a little random offset for extra projectiles
            const offsetX = (Math.random() - 0.5) * 20;
            const offsetY = (Math.random() - 0.5) * 20;
            const tempTarget = { x: opponent.x + offsetX, y: opponent.y + offsetY };
            spawnVisualProjectile(f, tempTarget, wcat, f.ATK * 0.7);
          }
        }
      }
    }

    // ── Body–body elastic collision ────────────────────────────────
    if(dist<f.r+opponent.r){
      const overlap=f.r+opponent.r-dist+0.5;
      const nx=dx/dist, ny=dy/dist;
      f.x-=nx*overlap*0.5; f.y-=ny*overlap*0.5;
      opponent.x+=nx*overlap*0.5; opponent.y+=ny*overlap*0.5;
      const relVx=f.vx-opponent.vx, relVy=f.vy-opponent.vy;
      const dot=relVx*nx+relVy*ny;
      if(dot>0){
        const e=0.85; // restitution
        f.vx      -=dot*nx*e; f.vy      -=dot*ny*e;
        opponent.vx+=dot*nx*e; opponent.vy+=dot*ny*e;
      }
      f.accel=1.0; opponent.accel=1.0;
      if(f.bodyHitCooldown<=0&&opponent.bodyHitCooldown<=0){
        const spF=Math.hypot(f.vx,f.vy),spO=Math.hypot(opponent.vx,opponent.vy);
        const [att,def]=spF>=spO?[f,opponent]:[opponent,f];
        dealDamage(att,def,att.ATK,'body');
        f.bodyHitCooldown=0.65; opponent.bodyHitCooldown=0.65;
      }
    }

    // ── Weapon–body collision ──────────────────────────────────────
    if(f.stunTimer<=0&&f.wepHitCooldown<=0&&weaponHitbox(f,opponent)){
      const cat = resolveCategory(f.weapon);
      const isRanged = WEAPON_SCALE[cat]?.projectile || f.weapon?.name?.toLowerCase().includes('shuriken');

      if (isRanged) {
        spawnVisualProjectile(f, opponent, cat, f.ATK);
        f.wepHitCooldown = 0.4; // Slightly faster firing for ranged
        // No immediate recoil for ranged firing
      } else {
        dealDamage(f,opponent,f.ATK,'⚔');
        f.wepHitCooldown=0.5;
        f.wepDir*=-1;
        f.accel=1.0; opponent.accel=1.0;
        const kx=(opponent.x-f.x)/dist, ky=(opponent.y-f.y)/dist;
        opponent.vx+=kx*180; opponent.vy+=ky*180;
        f.vx-=kx*120; f.vy-=ky*120;
        // recoil spin effect
        f.wepDir*=-1;
      }
    }

    // ── Weapon–weapon collision ────────────────────────────────────
    if(f.wepWepCooldown<=0&&opponent.wepWepCooldown<=0&&weaponVsWeapon(f,opponent)){
      f.wepDir*=-1; opponent.wepDir*=-1;
      f.wepWepCooldown=0.25; opponent.wepWepCooldown=0.25;
      const kx2=(f.x-opponent.x)/dist, ky2=(f.y-opponent.y)/dist;
      f.vx+=kx2*110; f.vy+=ky2*110;
      opponent.vx-=kx2*110; opponent.vy-=ky2*110;
      addLog('⚔ Vũ khí va chạm!','log-parry');
    }


    // Skill ticks
    for(const sk of f.skills){
      sk.timer+=dt;
      const cd=Math.max(0.5,sk.cd);
      if(sk.timer>=cd){
        sk.timer=0;
        applySkillTick(f,opponent,sk);
      }
    }

    // Magma zones
    if(f.hasMagmaStrike){
      f.magmaTimer+=dt;
      if(f.magmaTimer>=5){
        f.magmaTimer=0;
        f.magmaZones.push({x:f.x,y:f.y,life:5});
        addLog(`🌋 ${f.name} tạo vùng magma!`,'log-event');
      }
      f.magmaZones=f.magmaZones.filter(m=>{m.life-=dt;return m.life>0;});
      for(const m of f.magmaZones){
        if(Math.hypot(opponent.x-m.x,opponent.y-m.y)<f.r*2+opponent.r){
          opponent.curHp=Math.max(0,opponent.curHp-5*dt);
        }
      }
    }

    // Incineration
    if(f.hasIncineration){
      f.incinerTimer+=dt;
      if(f.incinerTimer>=10){
        f.incinerTimer=0;
        const d2=Math.hypot(opponent.x-f.x,opponent.y-f.y);
        if(d2<f.r*3.6+opponent.r){
          opponent.curHp=Math.max(0,opponent.curHp-5);
          addLog(`🔥 ${f.name} Incineration! -5 HP`,'log-event');
          opponent.hitFlash=0.2;
        }
      }
    }

    // Earthquake
    if(f.hasEarth){
      f.earthTimer+=dt;
      if(f.earthTimer>=10){
        f.earthTimer=0;
        opponent.stunTimer=Math.max(opponent.stunTimer,1);
        addLog(`🌍 ${f.name} Earth-Quake! stun 1s`,'log-event');
      }
    }

    // Steroid drain
    if(f.hasSteroid){
      f.curHp=Math.max(1,f.curHp-f.maxHp*0.01*dt);
    }

    // Determined Investor
    if(f.hasDeter){
      const noHit=f.hitFlash<=0;
      if(noHit) f.deterTimer+=dt; else f.deterTimer=0;
      if(f.deterTimer>=10){f.deterTimer=0;f.ATK=Math.max(1,f.ATK+1);f.SPD=Math.max(1,f.SPD+1);addLog(`📈 ${f.name} +1 ATK +1 SPD`,'log-event');}
    }

    // Healing scroll
    if(f.hasHealScroll){
      const noHit=f.hitFlash<=0;
      if(noHit) f.healTimer+=dt; else f.healTimer=0;
      if(f.healTimer>=10){f.healTimer=0;f.curHp=Math.min(f.maxHp,f.curHp+10);addLog(`📜 ${f.name} hồi 1 HP`,'log-event');}
    }

    updateHUD();
  });

  // ── Update Projectiles ──
  simProjectiles = simProjectiles.filter(p => {
    // Move projectile
    p.x += p.vx * dt;
    p.y += p.vy * dt;

    // Rotate Shuriken or Magic
    if (p.weaponName.toLowerCase().includes('shuriken') || p.wCategory === CAT.MAGIC) {
      p.rotation += 15 * dt; 
    }

    // Check if projectile hit ANY fighter, skip attacker
    let hitSomeone = false;
    for (const defender of fighters) {
      if (defender.idx === p.attackerIdx) continue; // Skip hitting self!
      const hitDist = Math.hypot(defender.x - p.x, defender.y - p.y);
      const hitRadius = defender.r + 15;
      if (hitDist < hitRadius) {
        dealDamage(p.attacker, defender, p.dmg, '🎯');
        hitSomeone = true;
        // Bounce if shuriken
        if (p.maxBounces > p.bounces && (p.weaponName.toLowerCase().includes('shuriken'))) {
          p.bounces++;
          // Reflect off defender
          const nx = (p.x - defender.x) / hitDist;
          const ny = (p.y - defender.y) / hitDist;
          const dot = p.vx * nx + p.vy * ny;
          p.vx = (p.vx - 2 * dot * nx) * 0.85;
          p.vy = (p.vy - 2 * dot * ny) * 0.85;
          hitSomeone = false; // Don't delete, let it bounce
        }
        break;
      }
    }
    if (hitSomeone) return false;

    // Check wall collisions for bouncing
    const pad = 10;
    let bounced = false;
    if (p.x < pad || p.x > arenaW - pad) {
      p.vx *= -0.85;
      p.x = Math.max(pad, Math.min(arenaW - pad, p.x));
      bounced = true;
    }
    if (p.y < pad || p.y > arenaH - pad) {
      p.vy *= -0.85;
      p.y = Math.max(pad, Math.min(arenaH - pad, p.y));
      bounced = true;
    }

    if (bounced && p.bounces < p.maxBounces) {
      p.bounces++;
    } else if (bounced) {
      return false;
    }

    // Remove projectile based on life
    p.life -= dt;
    return p.life > 0;
  });

  drawArena(dt);

  // Check end
  if(fighters[0].curHp<=0||fighters[1].curHp<=0||arenaTime>=180){
    endFight();
    return;
  }
  arenaAnimId=requestAnimationFrame(arenaLoop);
}

function applySkillTick(f,opp,sk){
  const n=sk.name.toLowerCase();
  if(n.includes('u=ma2')){
    if(f.SPD<opp.SPD){f.curHp=Math.min(f.maxHp,f.curHp+3);addLog(`💫 ${f.name} U=ma2 hồi 3 HP`,'log-event');}
  }
  if(n.includes('sand of time')){
    f.skills.forEach(s=>s.cd=Math.max(.5,s.cd-1));
    opp.skills.forEach(s=>s.cd+=1);
    addLog(`⌛ ${f.name} Sand of Time`,'log-event');
  }
  if(n.includes('dominator')){
    let bonus=0;
    if(f.ATK>opp.ATK)bonus++;if(f.SPD>opp.SPD)bonus++;if(f.HP>opp.maxHp/10)bonus++;
    if(f.BIQ>opp.BIQ)bonus++;if(f.IQ>opp.IQ)bonus++;
    if(bonus>=3){f.ATK+=bonus;addLog(`👑 ${f.name} Dominator +${bonus} ATK`,'log-event');}
  }
  if(n.includes('tornado')){
    const dx=f.x-opp.x,dy=f.y-opp.y,dist=Math.hypot(dx,dy);
    if(dist>5){opp.vx+=(dx/dist)*200;opp.vy+=(dy/dist)*200;}
    addLog(`🌪 ${f.name} Tornado! hút ${opp.name}`,'log-event');
  }
  if(n.includes('phasing')&&f.hitFlash>0){
    f.hitFlash=0;
    addLog(`👻 ${f.name} Phasing! tàng hình`,'log-event');
  }
}

function endFight(){
  fightRunning=false;
  cancelAnimationFrame(arenaAnimId);
  const [fA,fB]=fighters;
  const overlay=document.getElementById('resultOverlay');
  const title=document.getElementById('resultTitle');
  const reason=document.getElementById('resultReason');
  overlay.classList.add('show');
  if(fA.curHp<=0&&fB.curHp<=0){
    title.textContent='⚖ HÒA!';title.className='result-title draw';
    reason.textContent='Cả hai cùng ngã xuống.';
  } else if(fA.curHp<=0){
    title.textContent=`🏆 ${fB.name} THẮNG!`;title.className='result-title p2';
    reason.textContent=`${fA.name} hết máu.`;
  } else if(fB.curHp<=0){
    title.textContent=`🏆 ${fA.name} THẮNG!`;title.className='result-title p1';
    reason.textContent=`${fB.name} hết máu.`;
  } else {
    const wa=fA.curHp>fB.curHp;
    title.textContent=`🏆 ${wa?fA.name:fB.name} THẮNG!`;
    title.className=wa?'result-title p1':'result-title p2';
    reason.textContent=`Hết giờ 3 phút. ${fA.name}: ${Math.round(fA.curHp)} HP, ${fB.name}: ${Math.round(fB.curHp)} HP`;
  }
  addLog('═══════════ KẾT THÚC ═══════════','log-event');
}

function startArena(){
  show('screen-arena');
  logEl=document.getElementById('arenaLog');
  logEl.innerHTML='';
  document.getElementById('resultOverlay').classList.remove('show');

  // Size arena
  const frame=document.getElementById('arenaFrame');
  const baseSize=Math.min(600,window.innerWidth-32);
  arenaW=baseSize*2; // Double resolution
  arenaH=arenaW;
  arenaCanvas.width=arenaW;arenaCanvas.height=arenaH;
  arenaCanvas.style.width=baseSize+'px';arenaCanvas.style.height=baseSize+'px';
  frame.style.width=baseSize+'px';frame.style.height=baseSize+'px';

  // HUD
  document.getElementById('hudP1Name').textContent=players[0].race;
  document.getElementById('hudP2Name').textContent=players[1].race;

  const setStatRow=(idx,p)=>{
    const s=p.stats;
    document.getElementById('statsRow'+(idx+1)).innerHTML=
      ['ATK','SPD','IQ','BIQ','MA'].map(k=>`<div class="hud-stat">${k}<b>${s[k]}</b></div>`).join('');
  };
  setStatRow(0,players[0]);setStatRow(1,players[1]);

  fighters=initFighters();
  // link opponents
  fighters[0].opponent=fighters[1];
  fighters[1].opponent=fighters[0];

  simProjectiles=[]; // Clear projectiles
  updateHUD();
  drawArena(0);
  arenaTime=0;
  fightRunning=false;
  document.getElementById('btnStart').disabled=false;
}

function beginFight(){
  fightRunning=true;
  lastFrameTime=performance.now();
  document.getElementById('btnStart').disabled=true;
  // Failsafe: ensure balls have velocity before start
  fighters.forEach(f=>{
    if(Math.hypot(f.vx,f.vy)<10){
      const a=Math.random()*Math.PI*2;
      f.vx=Math.cos(a)*(120+f.SPD*20);
      f.vy=Math.sin(a)*(120+f.SPD*20);
    }
  });
  addLog(`⚔ ${players[0].race} vs ${players[1].race} — BẮT ĐẦU!`,'log-event');
  arenaAnimId=requestAnimationFrame(arenaLoop);
}

// ══════════════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════════════
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

let toastTimer;
function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2800);
}

// ══════════════════════════════════════════════════════
//  AUTO LOAD DATA
// ══════════════════════════════════════════════════════
window.onload = async () => {
  try {
    // Sử dụng đường dẫn tương đối là cách tốt nhất khi deploy trên GitHub Pages
    // Nó sẽ tự động trỏ đến https://kagegiri.github.io/LimBall/meobal.xlsx
    const response = await fetch('./meobal.xlsx');
    if (!response.ok) throw new Error('Không thể tải file meobal.xlsx từ server');
    
    const buffer = await response.arrayBuffer();
    if (typeof XLSX === 'undefined') throw new Error('Thư viện XLSX chưa tải xong');

    const wb = XLSX.read(buffer, {
      type: 'array',
      cellDates: true,
      cellText: false
    });

    GD = doParse(wb);

    if (!GD || !GD.Races || GD.Races.length === 0) {
      throw new Error('Dữ liệu không hợp lệ hoặc thiếu sheet Race');
    }

    showToast('✦ Đã kết nối Ma trận Dữ liệu ✦');
    console.log('Game Data Loaded:', GD);

  } catch (err) {
    console.error('Lỗi tự động tải dữ liệu:', err);
    showToast('❌ Lỗi tải dữ liệu: ' + err.message);
  }
};

window.addEventListener('resize',()=>{
  if(document.getElementById('screen-arena').classList.contains('active')&&!fightRunning){
    startArena();
  }
});

// ── Font warm-up: force browser to load Cinzel before first canvas draw ──
// Canvas ignores web fonts until they're actually rendered in DOM first.
// This hidden element triggers font load; then we redraw wheel once ready.
(function warmupFont(){
  const probe=document.createElement('span');
  probe.style.cssText='position:absolute;visibility:hidden;font-family:Cinzel,serif;font-size:12px;';
  probe.textContent='ABCabc';
  document.body.appendChild(probe);

  if(document.fonts && document.fonts.ready){
    document.fonts.ready.then(()=>{
      document.body.removeChild(probe);
      // Redraw wheel if spin screen is active
      if(wheelSlices.length) drawWheel(wheelSlices,wheelAngle);
    });
  } else {
    setTimeout(()=>{
      try{document.body.removeChild(probe);}catch(e){}
      if(wheelSlices.length) drawWheel(wheelSlices,wheelAngle);
    },800);
  }
})();
