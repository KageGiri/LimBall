<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✦ LimBall — Every Choice, Every Clash</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@400;700&family=IM+Fell+English:ital@0;1&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════════════
   LIMBALL — DARK FANTASY THEME  v0.2
   "Every Choice, Every Clash. The Path Written By You."
══════════════════════════════════════════════════════ */

/* ─── DESIGN TOKENS ──────────────────────────────────── */
:root{
  /* Core palette */
  --void:       #05030a;
  --abyss:      #0d0916;
  --stone:      #1a1328;
  --stone-light:#241c38;
  --rune:       #3d2e5a;
  --rune-bright:#6b4fa0;

  /* Gold / parchment */
  --gold:       #c9913a;
  --gold-bright:#f0c060;
  --gold-pale:  #e8d5a0;
  --parchment:  #d4b896;

  /* Accent blood */
  --blood:      #8b1a1a;
  --crimson:    #c0392b;
  --crimson-bright:#e05555;

  /* Arcane blue */
  --arcane:     #1a3d5c;
  --arcane-bright:#2980b9;
  --arcane-glow:#4ecdc4;

  /* Text */
  --text-primary: #e8d5a0;
  --text-dim:     #8a7a60;
  --text-faint:   #4a3f30;

  /* Misc */
  --r:4px;
  --r-lg:8px;
  --ff-title:'Cinzel Decorative',serif;
  --ff-head: 'Cinzel',serif;
  --ff-body: 'IM Fell English',serif;
  --ff-mono: 'JetBrains Mono',monospace;

  /* Glow shortcuts */
  --glow-gold:  0 0 18px #c9913a55, 0 0 40px #c9913a22;
  --glow-blood: 0 0 18px #c0392b55, 0 0 40px #c0392b22;
  --glow-arcane:0 0 18px #2980b955, 0 0 40px #2980b922;
}

/* ─── RESET ───────────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box;}
html{font-size:15px;scroll-behavior:smooth;}

body{
  background:var(--void);
  color:var(--text-primary);
  font-family:var(--ff-head);
  min-height:100vh;
  overflow-x:hidden;
}

/* ─── NOISE TEXTURE OVERLAY ──────────────────────────── */
body::before{
  content:'';
  position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity:0.03;
  pointer-events:none;z-index:0;
}

/* ─── SCREENS ─────────────────────────────────────────── */
.screen{display:none;flex-direction:column;align-items:center;min-height:100vh;padding:28px 16px 56px;position:relative;z-index:1;}
.screen.active{display:flex;}

/* ─── DECORATIVE DIVIDER ─────────────────────────────── */
.rune-divider{
  width:100%;max-width:480px;
  display:flex;align-items:center;gap:12px;
  margin:8px 0;
}
.rune-divider::before,.rune-divider::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold) 40%,transparent);
  opacity:.45;
}
.rune-divider span{
  font-family:var(--ff-mono);font-size:.55rem;letter-spacing:.3em;
  color:var(--gold);opacity:.7;white-space:nowrap;
}

/* ═══════════════════════════════════════════════════════
   LANDING SCREEN
═══════════════════════════════════════════════════════ */
#screen-landing{
  justify-content:center;
  background:
    radial-gradient(ellipse 80% 60% at 50% 30%, #1a0d2e 0%, transparent 70%),
    radial-gradient(ellipse 60% 40% at 20% 80%, #1a0a0a 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 80%, #0a0d1a 0%, transparent 60%),
    var(--void);
  color:var(--text-primary);
  gap:0;
}

/* ambient orbs */
#screen-landing::after{
  content:'';
  position:absolute;
  width:300px;height:300px;
  border-radius:50%;
  background:radial-gradient(circle,#3d1a6644 0%,transparent 70%);
  top:10%;left:50%;transform:translateX(-50%);
  pointer-events:none;
  animation:breathe 5s ease-in-out infinite;
}
@keyframes breathe{0%,100%{opacity:.5;transform:translateX(-50%) scale(1);}50%{opacity:1;transform:translateX(-50%) scale(1.12);}}

/* top ornament */
.landing-ornament{
  font-family:var(--ff-mono);font-size:.5rem;letter-spacing:.5em;
  color:var(--gold);opacity:.5;margin-bottom:20px;text-align:center;
}

/* Logo */
.landing-logo{
  position:relative;text-align:center;margin-bottom:6px;
}
.landing-logo-lim{
  display:block;
  font-family:var(--ff-title);
  font-size:clamp(3.5rem,12vw,7rem);
  font-weight:700;
  color:var(--gold-pale);
  letter-spacing:.06em;
  line-height:1;
  text-shadow:
    0 0 30px #c9913a88,
    0 0 80px #c9913a33,
    0 2px 4px #00000099;
  animation:titleGlow 4s ease-in-out infinite;
}
.landing-logo-ball{
  display:block;
  font-family:var(--ff-title);
  font-size:clamp(3.5rem,12vw,7rem);
  font-weight:700;
  color:transparent;
  -webkit-text-stroke:2px var(--gold);
  letter-spacing:.06em;
  line-height:1;
  text-shadow:none;
  filter:drop-shadow(0 0 20px #c9913a66);
}
@keyframes titleGlow{
  0%,100%{text-shadow:0 0 30px #c9913a88,0 0 80px #c9913a33,0 2px 4px #00000099;}
  50%{text-shadow:0 0 50px #f0c060bb,0 0 100px #c9913a55,0 2px 4px #00000099;}
}

.landing-sub{
  font-family:var(--ff-mono);
  font-size:.62rem;
  letter-spacing:.35em;
  color:var(--text-dim);
  text-align:center;
  margin-bottom:40px;
  text-transform:uppercase;
}

/* Upload zone — styled as ancient scroll */
.upload-card{
  position:relative;
  background:
    linear-gradient(135deg,#1e1530 0%,#150f24 50%,#1e1530 100%);
  border:1px solid var(--rune);
  border-radius:var(--r-lg);
  padding:36px 44px;
  text-align:center;
  cursor:pointer;
  transition:all .3s ease;
  max-width:420px;
  width:100%;
  box-shadow:
    0 0 0 1px #ffffff08,
    0 8px 32px #00000088,
    inset 0 1px 0 #ffffff0a;
}
.upload-card::before{
  content:'';
  position:absolute;inset:-1px;
  border-radius:calc(var(--r-lg) + 1px);
  background:linear-gradient(135deg,#6b4fa055 0%,transparent 50%,#c9913a33 100%);
  pointer-events:none;
  opacity:0;transition:opacity .3s;
}
.upload-card:hover{
  border-color:var(--gold);
  box-shadow:var(--glow-gold),0 8px 32px #00000088,inset 0 1px 0 #ffffff0a;
  transform:translateY(-2px);
}
.upload-card:hover::before{opacity:1;}
.upload-card input{display:none;}

.upload-icon{
  font-size:2rem;
  margin-bottom:14px;
  display:block;
  opacity:.8;
  filter:drop-shadow(0 0 8px #c9913a66);
}
.upload-label{
  font-family:var(--ff-head);
  font-size:1rem;
  font-weight:600;
  letter-spacing:.1em;
  color:var(--gold-pale);
  margin-bottom:8px;
}
.upload-hint{
  font-family:var(--ff-mono);font-size:.62rem;
  color:var(--text-dim);
  line-height:1.7;
}
.upload-hint em{
  color:var(--gold);opacity:.8;font-style:normal;
}
.upload-status{
  margin-top:20px;
  font-family:var(--ff-mono);font-size:.68rem;
  color:var(--arcane-glow);
  min-height:22px;
  letter-spacing:.05em;
}

/* version badge */
.landing-version{
  margin-top:28px;
  font-family:var(--ff-mono);font-size:.52rem;
  letter-spacing:.3em;color:var(--text-faint);
}

/* ═══════════════════════════════════════════════════════
   PLAYER SELECT SCREEN
═══════════════════════════════════════════════════════ */
#screen-select{
  background:
    radial-gradient(ellipse 100% 50% at 50% 0%, #1a0d2e22 0%, transparent 60%),
    var(--abyss);
  gap:16px;
}

.section-title{
  font-family:var(--ff-head);
  font-size:1.1rem;
  font-weight:700;
  letter-spacing:.2em;
  color:var(--gold-pale);
  text-align:center;
  padding-bottom:8px;
  margin-bottom:2px;
  position:relative;
  align-self:center;
  text-transform:uppercase;
}
.section-title::after{
  content:'';
  position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:60%;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  opacity:.5;
}

.player-slots{
  display:grid;grid-template-columns:1fr 1fr;gap:14px;
  width:100%;max-width:660px;
}

.player-slot{
  background:linear-gradient(135deg,var(--stone) 0%,var(--abyss) 100%);
  border:1px solid var(--rune);
  border-radius:var(--r-lg);
  padding:16px;
  position:relative;
  min-height:150px;
  box-shadow:0 4px 20px #00000066,inset 0 1px 0 #ffffff08;
  transition:border-color .2s,box-shadow .2s;
}
.player-slot:has(.slot-race):not(:has(.slot-empty)){
  border-color:var(--gold);
  box-shadow:var(--glow-gold),0 4px 20px #00000066,inset 0 1px 0 #ffffff08;
}

/* slot corner runes */
.player-slot::before{
  content:'✦';
  position:absolute;top:8px;right:10px;
  font-size:.55rem;color:var(--gold);opacity:.3;
}

.slot-label{
  font-family:var(--ff-mono);font-size:.58rem;
  letter-spacing:.3em;color:var(--text-dim);
  margin-bottom:10px;text-transform:uppercase;
}
.slot-race{
  font-family:var(--ff-head);
  font-size:1.05rem;font-weight:700;
  color:var(--gold-pale);
  letter-spacing:.06em;
  margin-bottom:6px;
  text-shadow:0 0 12px #c9913a55;
}
.slot-stats{
  font-family:var(--ff-mono);font-size:.62rem;
  line-height:2;color:var(--text-dim);
}
.slot-stats b{color:var(--gold-bright);}
.slot-empty{
  color:var(--text-faint);
  font-family:var(--ff-body);
  font-style:italic;
  font-size:.85rem;
  margin-top:16px;
  line-height:1.7;
}
.slot-tag{
  display:inline-block;
  font-family:var(--ff-mono);font-size:.54rem;
  padding:2px 7px;border-radius:3px;
  margin:2px 2px 0 0;
  letter-spacing:.04em;
}
.slot-tag.weapon{
  background:#2a1800;border:1px solid #c9913a55;color:#c9913a;
}
.slot-tag.skill{
  background:#00161a;border:1px solid #2a9d8f55;color:#4ecdc4;
}
.slot-tag.gear{
  background:#1a0000;border:1px solid #c0392b55;color:#e05555;
}

/* ─── BUTTONS — Stone Tablet Style ──────────────────── */
.btn{
  font-family:var(--ff-head);
  font-weight:600;font-size:.78rem;
  letter-spacing:.12em;text-transform:uppercase;
  padding:11px 26px;
  border:1px solid var(--rune);
  border-radius:var(--r);
  cursor:pointer;
  background:linear-gradient(135deg,var(--stone-light) 0%,var(--stone) 100%);
  color:var(--text-primary);
  box-shadow:0 2px 8px #00000066,inset 0 1px 0 #ffffff0a;
  transition:all .18s ease;
  position:relative;overflow:hidden;
}
.btn::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to bottom,#ffffff06 0%,transparent 50%);
  pointer-events:none;
}
.btn:hover{
  border-color:var(--gold);
  color:var(--gold-pale);
  box-shadow:var(--glow-gold),0 2px 8px #00000066,inset 0 1px 0 #ffffff0a;
  transform:translateY(-1px);
}
.btn:active{transform:translateY(0);box-shadow:0 1px 4px #00000066;}
.btn:disabled{opacity:.3;cursor:not-allowed;transform:none!important;box-shadow:none!important;}

.btn-primary{
  background:linear-gradient(135deg,#2a1800 0%,#1a1000 100%);
  border-color:var(--gold);
  color:var(--gold-pale);
  box-shadow:var(--glow-gold),0 2px 8px #00000066;
}
.btn-primary:hover{
  background:linear-gradient(135deg,#3d2200 0%,#2a1800 100%);
  color:var(--gold-bright);
}
.btn-accent{
  background:linear-gradient(135deg,var(--blood) 0%,#3a0000 100%);
  color:#ffcccc;border-color:var(--crimson);
  box-shadow:var(--glow-blood),0 2px 8px #00000066;
}
.btn-accent:hover{
  background:linear-gradient(135deg,var(--crimson) 0%,var(--blood) 100%);
  color:#fff;
}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}

/* ═══════════════════════════════════════════════════════
   SPIN SCREEN
═══════════════════════════════════════════════════════ */
#screen-spin{
  background:
    radial-gradient(ellipse 90% 60% at 50% 20%,#1a0d2e 0%,transparent 70%),
    var(--void);
  color:var(--text-primary);
  justify-content:flex-start;gap:0;padding:0;
}

.spin-header{
  width:100%;
  background:linear-gradient(to right,#120e1e,#0d0916,#120e1e);
  padding:14px 20px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--rune);
  box-shadow:0 2px 16px #00000055;
}
.spin-header-left{display:flex;flex-direction:column;gap:3px;}
.spin-player-label{
  font-family:var(--ff-mono);font-size:.58rem;
  letter-spacing:.3em;color:var(--text-dim);
}
.spin-player-race{
  font-family:var(--ff-head);font-size:1rem;font-weight:700;
  color:var(--gold-pale);letter-spacing:.08em;
  text-shadow:0 0 12px #c9913a55;
}
.spin-step-label{
  font-family:var(--ff-mono);font-size:.58rem;
  color:var(--gold-bright);letter-spacing:.2em;
  text-align:right;
  padding:4px 10px;
  border:1px solid var(--gold)44;
  border-radius:3px;
  background:#c9913a0a;
}

.spin-body{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:16px;padding:16px;width:100%;
}

/* Wheel */
.wheel-wrap{
  position:relative;
  width:min(420px,90vw);height:min(420px,90vw);
}
#spinCanvas{
  width:100%;height:100%;border-radius:50%;
  filter:drop-shadow(0 0 30px #c9913a44) drop-shadow(0 0 60px #6b4fa022);
  position:relative;z-index:2;
}

/* outer decorative ring */
.wheel-outer-ring{
  position:absolute;inset:-10px;border-radius:50%;
  border:2px solid transparent;
  background:linear-gradient(transparent,transparent) padding-box,
    linear-gradient(135deg,#c9913a,#6b4fa0,#c9913a,#2980b9,#c9913a) border-box;
  box-shadow:
    0 0 30px #c9913a33,
    0 0 60px #c9913a11,
    inset 0 0 30px #00000066;
  pointer-events:none;z-index:1;
  animation:ringRotate 20s linear infinite;
}
@keyframes ringRotate{from{filter:hue-rotate(0deg);}to{filter:hue-rotate(360deg);}}

/* second ring */
.wheel-outer-ring::before{
  content:'';
  position:absolute;inset:4px;border-radius:50%;
  border:1px solid #c9913a22;
}

/* tick marks on ring */
.wheel-outer-ring::after{
  content:'';
  position:absolute;inset:-4px;border-radius:50%;
  border:1px dashed #c9913a18;
}

/* pointer — ornate downward arrow */
.wheel-pointer{
  position:absolute;top:-28px;left:50%;transform:translateX(-50%);
  z-index:4;
  width:20px;height:34px;
  filter:drop-shadow(0 2px 8px #c9913a88);
}
.wheel-pointer::before{
  content:'';
  position:absolute;left:50%;transform:translateX(-50%);
  top:0;
  width:0;height:0;
  border-left:10px solid transparent;
  border-right:10px solid transparent;
  border-top:20px solid var(--gold-bright);
}
.wheel-pointer::after{
  content:'';
  position:absolute;left:50%;transform:translateX(-50%);
  top:16px;
  width:4px;height:18px;
  background:linear-gradient(to bottom,var(--gold-bright),var(--gold)66);
  border-radius:0 0 2px 2px;
}

.wheel-center{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:52px;height:52px;border-radius:50%;
  background:radial-gradient(circle,#2a1a4a 0%,#0d0916 100%);
  border:2px solid var(--gold)66;
  box-shadow:0 0 16px #00000099,0 0 8px #c9913a33;
  z-index:3;
  display:flex;align-items:center;justify-content:center;
  font-size:.7rem;color:var(--gold);opacity:.8;
}

/* result box — carved stone style */
.spin-result-box{
  background:linear-gradient(135deg,#1a1328 0%,#120e1e 100%);
  border:1px solid var(--rune);
  border-radius:var(--r-lg);
  padding:14px 22px;
  text-align:center;
  min-height:64px;
  width:100%;max-width:380px;
  box-shadow:0 4px 20px #00000066,inset 0 1px 0 #ffffff08;
  position:relative;
  overflow:hidden;
}
.spin-result-box::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 50% at 50% 0%,#c9913a0a,transparent);
  pointer-events:none;
}
.spin-result-label{
  font-family:var(--ff-mono);font-size:.56rem;
  color:var(--text-dim);letter-spacing:.3em;
  margin-bottom:5px;text-transform:uppercase;
}
.spin-result-value{
  font-family:var(--ff-head);font-size:1.2rem;font-weight:700;
  color:var(--gold-bright);
  letter-spacing:.06em;
  text-shadow:0 0 16px #c9913a66;
}
.spin-result-sub{
  font-family:var(--ff-body);font-style:italic;
  font-size:.73rem;color:var(--text-dim);margin-top:3px;
  line-height:1.4;
}

/* SPIN BUTTON — dramatic */
.spin-btn{
  font-family:var(--ff-head);font-weight:700;font-size:.9rem;
  letter-spacing:.2em;text-transform:uppercase;
  padding:14px 48px;
  background:linear-gradient(135deg,#3d0000 0%,#1a0000 50%,#3d0000 100%);
  color:#ffcccc;
  border:1px solid var(--crimson);
  border-radius:var(--r);
  cursor:pointer;
  transition:all .2s ease;
  box-shadow:var(--glow-blood),0 4px 20px #00000077;
  position:relative;overflow:hidden;
}
.spin-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to bottom,#ffffff0a 0%,transparent 50%);
  pointer-events:none;
}
.spin-btn:hover{
  background:linear-gradient(135deg,#5a0000 0%,#3d0000 50%,#5a0000 100%);
  color:#fff;
  box-shadow:0 0 30px #c0392b88,0 0 60px #c0392b33,0 4px 20px #00000077;
  transform:translateY(-2px);
}
.spin-btn:active{transform:translateY(0);}
.spin-btn:disabled{
  background:linear-gradient(135deg,#1a1328,#120e1e);
  color:var(--text-faint);
  border-color:var(--rune);
  box-shadow:none;transform:none;cursor:not-allowed;
}

/* stat pills */
.stat-pills{
  display:flex;gap:6px;flex-wrap:wrap;justify-content:center;
  max-width:400px;
}
.stat-pill{
  font-family:var(--ff-mono);font-size:.6rem;
  padding:4px 10px;border-radius:3px;
  background:#1a1328;
  border:1px solid var(--rune);
  display:flex;gap:6px;align-items:center;
  color:var(--text-dim);
}
.stat-pill b{color:var(--gold-bright);}

/* ═══════════════════════════════════════════════════════
   ARENA SCREEN
═══════════════════════════════════════════════════════ */
#screen-arena{
  background:var(--void);padding:0;justify-content:flex-start;
}

/* HUD top bar */
.arena-top{
  width:100%;
  background:linear-gradient(to right,#0d0010,#0d0916,#000d0a);
  padding:10px 14px;
  display:flex;justify-content:space-between;align-items:flex-start;
  border-bottom:1px solid var(--rune);
  gap:8px;
  box-shadow:0 2px 16px #00000077;
}
.hud-player{flex:1;}
.hud-name{
  font-family:var(--ff-head);
  font-size:.82rem;font-weight:700;
  letter-spacing:.1em;
  margin-bottom:3px;text-shadow:0 0 10px currentColor;
}
.hud-name.p1{color:var(--crimson-bright);}
.hud-name.p2{color:var(--arcane-glow);}

/* HP bar — thick ornate style */
.hud-hp-bar{
  height:10px;
  background:#0a0a0f;
  border-radius:2px;
  overflow:hidden;
  margin-bottom:4px;
  border:1px solid #ffffff10;
  box-shadow:inset 0 1px 3px #00000066;
}
.hud-hp-fill{height:100%;border-radius:1px;transition:width .2s ease;}
.hud-hp-fill.p1{
  background:linear-gradient(90deg,#8b0000,var(--crimson-bright));
  box-shadow:0 0 8px #c0392b88;
}
.hud-hp-fill.p2{
  background:linear-gradient(90deg,var(--arcane),var(--arcane-glow));
  box-shadow:0 0 8px #2a9d8f88;
}
.hud-hp-text{
  font-family:var(--ff-mono);font-size:.56rem;
  color:var(--text-dim);letter-spacing:.05em;
}
.hud-stats-row{display:flex;gap:5px;margin-top:3px;flex-wrap:wrap;}

<script>
// ══════════════════════════════════════════════════════
//  DATA LAYER — parse xlsx
// ══════════════════════════════════════════════════════
let GD = null; // GameData

const _n = v=>{
  if(v==null) return null;
  const s=String(v).trim().toLowerCase();
  if(s===''||s==='nan'||s==='x') return null;
  const n=parseFloat(v); return isNaN(n)?null:n;
};
const _s = v=>v==null?'':String(v).trim();
const _ok = v=>v!=null&&String(v).trim()!==''&&String(v).trim().toLowerCase()!=='nan';

function getWS(wb,name){
  return wb.Sheets[name]||wb.Sheets[Object.keys(wb.Sheets).find(k=>k.trim()===name.trim())];
}
function toArr(ws){return XLSX.utils.sheet_to_json(ws,{header:1,defval:null});}

function parseStatSheet(ws){
  if(!ws) return {};
  const d=toArr(ws);
  const hi=d.findIndex(r=>r&&r.some(c=>_s(c).toLowerCase()==='race'));
  if(hi<0) return {};
  const races=d[hi].slice(1).map(_s).filter(Boolean);
  const res={}; races.forEach(r=>{res[r]=[];});
  for(let i=hi+1;i<d.length;i++){
    const row=d[i]; if(!row) continue;
    const lv=_n(row[0]); if(lv===null) continue;
    races.forEach((r,j)=>res[r].push({level:lv,weight:_n(row[j+1])}));
  }
  return res;
}

function parseRaces(ws){
  if(!ws) return [];
  return toArr(ws)
    .filter(r=>r&&_ok(r[0])&&_s(r[0]).toLowerCase()!=='race')
    .map(r=>({race:_s(r[0]),weight:_n(r[1])||0,subWheel:_s(r[2]),trait:_s(r[3])}))
    .filter(r=>r.weight>0);
}

function parseSubraces(ws){
  if(!ws) return {};
  const data=toArr(ws);
  if(!data.length) return {};
  const res={};
  const row0=data[0]||[];

  const SKIP=new Set(['type','stt','trọng số','đặc điểm','hiệu ứng',
    'werebeast',"dragon's type","god's gift","god's gifts",
    'angel rank','màu da','elemental','số lượng','alien nào?',
    'body count',"demon's sin",'nan','']);

  // Scan row 0 for wheel titles — all blocks start at row 0
  for(let tc=0;tc<row0.length;tc++){
    const title=_s(row0[tc]);
    if(!title||title.toLowerCase()==='nan') continue;
    if(!isNaN(parseFloat(title))) continue;
    if(res[title]) continue; // already parsed (avoid duplicate Troll's Type)

    // Standard layout: title@tc, stt@tc, item@tc+1, weight@tc+2, effect@tc+3
    const items=[];
    for(let r=2;r<data.length;r++){
      const row=data[r]; if(!row) continue;
      const itemCell=row[tc+1], wCell=row[tc+2];
      if(!_ok(itemCell)&&!_ok(row[tc])) break;
      const itemS=_s(itemCell);
      if(SKIP.has(itemS.toLowerCase())) continue;
      const w=_n(wCell); if(w===null||w<=0) continue;
      const label=itemCell instanceof Date ? String(itemCell.getDate()) : itemS;
      if(!label) continue;
      items.push({item:label, weight:w, effect:_s(row[tc+3]||'')});
    }

    if(items.length>0){
      // Col-55 mislabeled fix: if items look like vampire blood type → rename
      const isVampBlood=items.every(x=>
        ['red','white','black','pale','trắng','vàng','đen'].includes(x.item.toLowerCase()));
      res[isVampBlood ? 'Khẩu vị độc đáo' : title] = items;
      continue;
    }

    // Ben10-style: title@tc but data items ALSO at tc (stt@tc-1)
    const itemsB=[];
    for(let r=2;r<data.length;r++){
      const row=data[r]; if(!row) continue;
      const itemCell=row[tc], wCell=row[tc+1];
      const itemS=_s(itemCell);
      if(SKIP.has(itemS.toLowerCase())) continue;
      if(!_ok(itemCell)) break;
      const w=_n(wCell); if(w===null||w<=0) continue;
      itemsB.push({item:itemS, weight:w, effect:_s(row[tc+2]||'')});
    }
    if(itemsB.length>0) res[title]=itemsB;
  }
  return res;
}

// Alias: Race sheet "Sub-race Wheel?" value → actual Subrace sheet key
const SUBRACE_ALIAS={
  "sins wheel":         "Sin Wheel",
  "sin wheel":          "Sin Wheel",
  "god's gifts":        "God's Gift",
  "god's gift":         "God's Gift",
  "which god?":         "God's Gift",
  "dwarf's type":       "Dwarf Type",
  "dwarf type":         "Dwarf Type",
  "body count":         "Body Count",
  "khẩu vị độc đáo":   "Khẩu vị độc đáo",
  "ben 10":             "Ben10",
  "ben10":              "Ben10",
  "bone lineage":       null,
  "bone leniage":       null,
  "quay 1 robot":       null,
  "damage type":        null,
};

function resolveSubraceKey(name,subraces){
  const lo=_s(name).toLowerCase().trim();
  if(!lo||lo.includes('không có')||lo.includes('💀')
     ||lo==='x'||lo==='none') return null;
  if(Object.prototype.hasOwnProperty.call(SUBRACE_ALIAS,lo))
    return SUBRACE_ALIAS[lo];
  return Object.keys(subraces).find(k=>k.toLowerCase()===lo)||null;
}

function parseSkillWheel(ws){
  if(!ws) return {};
  const d=toArr(ws); const res={};
  for(let r=0;r<d.length;r++){
    const row=d[r]; if(!row) continue;
    if(!row.some(c=>_s(c).toLowerCase()==='race')) continue;
    const blocks=[];
    for(let c=0;c<row.length;c++)
      if(_s(row[c]).toLowerCase()==='race'&&_ok(row[c+1])) blocks.push({col:c,race:_s(row[c+1])});
    let dr=r+1;
    while(dr<d.length){
      const drow=d[dr]; if(!drow){dr++;continue;}
      if(drow.some(c=>_s(c).toLowerCase()==='race')) break;
      for(const{col,race}of blocks){
        const sc=_n(drow[col]),sw=_n(drow[col+1]);
        if(sc===null||sw===null) continue;
        if(!res[race]) res[race]=[];
        res[race].push({skillCount:sc,weight:sw});
      }
      dr++;
    }
  }
  return res;
}

function parseSkills(ws){
  if(!ws) return [];
  return toArr(ws).filter(r=>r&&_n(r[0])!==null)
    .map(r=>({id:_n(r[0]),name:_s(r[1]),weight:_n(r[2])||4,effect:_s(r[3])}));
}

function parseGear(ws){
  if(!ws) return [];
  return toArr(ws).filter(r=>r&&_n(r[0])!==null)
    .map(r=>({id:_n(r[0]),name:_s(r[1]),weight:_n(r[2])||2.63,effect:_s(r[3]),type:_s(r[4])}));
}

function parseGearWheel(ws){
  if(!ws) return [];
  const d=toArr(ws);
  return d.filter(r=>r&&_ok(r[0])&&!_s(r[0]).includes('Số'))
    .map(r=>{const m=_s(r[0]).match(/(\d+)/);return{gearCount:m?parseInt(m[1]):0,weight:_n(r[1])||1};})
    .filter(r=>r.weight>0);
}

function parseWeaponWheel(ws){
  if(!ws) return [{item:'Có',weight:70},{item:'Không',weight:30}];
  const d=toArr(ws);
  const res=[];
  for(const row of d){
    if(!row) continue;
    const item=_s(row[0]);
    if(!item||item.includes('?')||item.toLowerCase().includes('hiệu')) continue;
    const w=_n(row[2])??_n(row[1]); if(w===null) continue;
    res.push({item,weight:w});
  }
  return res.length?res:[{item:'Có',weight:70},{item:'Không',weight:30}];
}

function parseWeapons(ws){
  if(!ws) return [];
  const d=toArr(ws);
  if(!d.length) return [];
  const hdr=d[0]||[];
  const lvLabels=hdr.slice(1,11).map(_s);
  return d.slice(1).filter(r=>r&&_ok(r[0])&&_s(r[0]).toLowerCase()!=='nan').map(r=>{
    const milestones={};
    for(let i=0;i<10;i++){const e=_s(r[i+1]);if(e)milestones[i+1]={label:lvLabels[i]||`Lv${i+1}`,effect:e};}
    return{name:_s(r[0]),category:_s(r[11]),milestones,scale:_s(r[13])};
  });
}

function doParse(wb){
  return{
    Races:parseRaces(getWS(wb,'Race')),
    Subraces:parseSubraces(getWS(wb,'Subrace')),
    Stats:{
      ATK:parseStatSheet(getWS(wb,'ATK')),
      HP:parseStatSheet(getWS(wb,'HP')),
      SPD:parseStatSheet(getWS(wb,'SPD')),
      IQ:parseStatSheet(getWS(wb,'IQ')),
      BIQ:parseStatSheet(getWS(wb,'BIQ')),
      MA:parseStatSheet(getWS(wb,'Weapon Mastery Martial Arts')),
    },
    SkillWheel:parseSkillWheel(getWS(wb,'Skill Wheel')),
    Skills:parseSkills(getWS(wb,'Skill')),
    Gear:parseGear(getWS(wb,'Gear')),
    GearWheel:parseGearWheel(getWS(wb,'Gear Wheel')),
    WeaponWheel:parseWeaponWheel(getWS(wb,'Weapon wheel ')),
    Weapons:parseWeapons(getWS(wb,'Weapons')),
  };
}

// ══════════════════════════════════════════════════════
//  GACHA ENGINE
// ══════════════════════════════════════════════════════
function spin(slices){
  const v=slices.filter(s=>parseFloat(s.weight)>0&&!isNaN(parseFloat(s.weight)));
  if(!v.length) return null;
  let t=v.reduce((s,x)=>s+parseFloat(x.weight),0),r=Math.random()*t;
  for(const s of v){r-=parseFloat(s.weight);if(r<0)return s;}
  return v[v.length-1];
}

function spinStat(tbl,race){
  const k=Object.keys(tbl).find(x=>x.toLowerCase()===race.toLowerCase());
  if(!k) return 1;
  const sl=tbl[k].filter(s=>s.weight!==null&&s.weight>0).map(s=>({item:s.level,weight:s.weight}));
  return sl.length?spin(sl).item:1;
}

function sampleNR(list,count){
  const pool=[...list],out=[];
  for(let i=0;i<count&&pool.length;i++){
    const r=spin(pool); if(!r) break;
    out.push(r);
    pool.splice(pool.findIndex(x=>x.item===r.item),1);
  }
  return out;
}

// Apply stat modifiers (gears, skills, mastery)
function applyStatModifiers(char){
  for(const g of char.gears){
    const e=g.effect.toLowerCase();
    if(e.includes('+2 speed')||e.includes('+2 speed')) char.stats.SPD=Math.max(1,char.stats.SPD+2);
    if(e.includes('+2 hp')) char.stats.HP=Math.max(1,char.stats.HP+2);
    if(e.includes('+1 iq')) char.stats.IQ=Math.max(1,char.stats.IQ+1);
    if(e.includes('+3 iq')) char.stats.IQ=Math.max(1,char.stats.IQ+3);
    if(e.includes('+1 biq')) char.stats.BIQ=Math.max(1,char.stats.BIQ+1);
    if(e.includes('+3 biq')) char.stats.BIQ=Math.max(1,char.stats.BIQ+3);
    if(e.includes('+1 iq') && e.includes('+2 biq')){char.stats.IQ=Math.max(1,char.stats.IQ+1);char.stats.BIQ=Math.max(1,char.stats.BIQ+2);}
    if(e.includes('+3 atk')&&e.includes('+3 hp')){char.stats.ATK=Math.max(1,char.stats.ATK+3);char.stats.HP=Math.max(1,char.stats.HP+3);}
    if(e.includes('+1 atk')&&e.includes('+1 hp')){char.stats.ATK=Math.max(1,char.stats.ATK+1);char.stats.HP=Math.max(1,char.stats.HP+1);}
    if(e.includes('-2 speed')||e.includes('-2 speed')) char.stats.SPD=Math.max(1,char.stats.SPD-2);
    if(e.includes('-1 iq')&&e.includes('-1 biq')){char.stats.IQ=Math.max(1,char.stats.IQ-1);char.stats.BIQ=Math.max(1,char.stats.BIQ-1);}
    if(e.includes('+4 atk')&&e.includes('+4 hp')){char.stats.ATK=Math.max(1,char.stats.ATK+4);char.stats.HP=Math.max(1,char.stats.HP+4);}
    if(e.includes('+1 hp')&&e.includes('-1 iq')) {char.stats.HP=Math.max(1,char.stats.HP+1);char.stats.IQ=Math.max(1,char.stats.IQ-1);}
  }
  // Swinging Maestro skill
  for(const sk of char.skills){
    if(sk.name==='Swinging Maestro') char.stats.BIQ=Math.max(1,char.stats.BIQ+4);
    if(sk.name==='Enlarging'){char.stats.ATK=Math.max(1,char.stats.ATK+3);char.stats.HP=Math.max(1,char.stats.HP+3);char.stats.SPD=Math.max(1,char.stats.SPD-6);}
    if(sk.name==='Shrinking'){char.stats.SPD=Math.max(1,char.stats.SPD+6);char.stats.ATK=Math.max(1,char.stats.ATK-3);char.stats.HP=Math.max(1,char.stats.HP-3);}
    if(sk.name==='Healing Factor') char.stats.HP=Math.max(1,char.stats.HP+1);
  }
  // Weapon Mastery milestones
  if(char.weapon){
    const ma=char.stats.MA;
    const mkeys=Object.keys(char.weapon.milestones).map(Number).filter(k=>k<=ma);
    if(mkeys.length){
      const mk=Math.max(...mkeys);
      const eff=char.weapon.milestones[mk].effect.toLowerCase();
      if(eff.includes('+1 atk')) char.stats.ATK=Math.max(1,char.stats.ATK+1);
      if(eff.includes('+2 atk')) char.stats.ATK=Math.max(1,char.stats.ATK+2);
      if(eff.includes('+1 speed')||eff.includes('+1 spd')) char.stats.SPD=Math.max(1,char.stats.SPD+1);
      if(eff.includes('+2 speed')) char.stats.SPD=Math.max(1,char.stats.SPD+2);
      if(eff.includes('+1 biq')) char.stats.BIQ=Math.max(1,char.stats.BIQ+1);
      if(eff.includes('+2 biq')) char.stats.BIQ=Math.max(1,char.stats.BIQ+2);
    }
    char.weaponMasteryEffect=mkeys.length?char.weapon.milestones[Math.max(...mkeys)]:null;
  }
  // enforce minimums
  ['ATK','HP','SPD','BIQ'].forEach(k=>char.stats[k]=Math.max(1,char.stats[k]));
  return char;
}

// Wheel canvas
const spinCanvas=document.getElementById('spinCanvas');
const spinCtx=spinCanvas.getContext('2d');
let wheelSlices=[];
let wheelAngle=0;
let wheelSpin=false;
let wheelVel=0;
let wheelTarget=0;
let wheelAnimId=null;
let onSpinDone=null;

function drawWheel(slices, angle) {
  const W = spinCanvas.width, H = spinCanvas.height;
  const cx = W / 2, cy = H / 2, r = cx - 12;

  // 1. Reset & Clear
  spinCtx.setTransform(1, 0, 0, 1, 0, 0);
  spinCtx.clearRect(0, 0, W, H);

  if (!slices || slices.length === 0) return;

  // 2. Defensive check for angle
  const safeAngle = isNaN(angle) ? 0 : angle;

  // 3. Calculate total weight robustly
  let total = 0;
  slices.forEach(s => {
    const w = parseFloat(s.weight);
    total += (isNaN(w) || w <= 0) ? 0.01 : w;
  });
  if (total <= 0) total = 1;

  const PALETTE = [
    '#ff6b6b', '#4ecdc4', '#ffe66d', '#5f27cd', '#54a0ff',
    '#1dd1a1', '#ff9f43', '#ee5253', '#00d2d3', '#f368e0'
  ];

  // 4. Draw Background Ring (Outer)
  spinCtx.beginPath();
  spinCtx.arc(cx, cy, r + 4, 0, Math.PI * 2);
  spinCtx.fillStyle = '#05030a';
  spinCtx.fill();
  spinCtx.strokeStyle = 'rgba(201, 145, 58, 0.8)';
  spinCtx.lineWidth = 4;
  spinCtx.stroke();

  // 5. Draw Slices
  let currentA = safeAngle - Math.PI / 2;

  slices.forEach((s, i) => {
    const sw = parseFloat(s.weight);
    const w = (isNaN(sw) || sw <= 0) ? 0.01 : sw;
    const theta = (w / total) * Math.PI * 2;

    // Draw slice arc
    spinCtx.beginPath();
    spinCtx.moveTo(cx, cy);
    spinCtx.arc(cx, cy, r, currentA, currentA + theta);
    spinCtx.closePath();

    spinCtx.fillStyle = PALETTE[i % PALETTE.length];
    spinCtx.fill();

    spinCtx.strokeStyle = 'rgba(0,0,0,0.2)';
    spinCtx.lineWidth = 1;
    spinCtx.stroke();

    // 6. Draw Label
    const mid = currentA + theta / 2;
    const label = s.label || s.item || s.name || '?';

    spinCtx.save();
    spinCtx.translate(cx, cy);
    spinCtx.rotate(mid);

    spinCtx.font = 'bold 30px "JetBrains Mono", monospace';
    spinCtx.textAlign = 'right';
    spinCtx.textBaseline = 'middle';
    
    // Text shadow for readability
    spinCtx.shadowBlur = 6;
    spinCtx.shadowColor = 'rgba(0,0,0,0.9)';
    spinCtx.fillStyle = 'white';
    
    // Adjust text position based on radius
    spinCtx.fillText(label, r * 0.85, 0);
    spinCtx.restore();

    currentA += theta;
  });

  // 7. Center Hub (Top Layer)
  spinCtx.beginPath();
  spinCtx.arc(cx, cy, 32, 0, Math.PI * 2);
  spinCtx.fillStyle = '#1a1328';
  spinCtx.fill();
  spinCtx.strokeStyle = '#c9913a';
  spinCtx.lineWidth = 3;
  spinCtx.stroke();
}

// ─── SPIN SPEED TIERS ───────────────────────────────
// Stat spins = mốc chuẩn (decay chậm, hồi hộp nhất)
// Race/Subrace/Gear/Skill/Weapon = nhanh hơn (shorter ceremony)
// GearCount/SkillCount/WeaponYesNo = rất nhanh (chỉ là lựa chọn phụ)
const SPIN_SPEED = {
  // [initialVel, decayRate]  — decay gần 1 = chậm dừng hơn
  stat:         [0.26, 0.9942],  // mốc: ~4-5 giây
  race:         [0.38, 0.9910],  // nhanh hơn stat ~40%
  subrace:      [0.34, 0.9920],
  gear:         [0.36, 0.9915],
  skill:        [0.36, 0.9915],
  weapon_pick:  [0.34, 0.9920],
  fast:         [0.42, 0.9880],  // gear_count, skill_count, weapon yes/no
};

function getSpeedTier(stepKey){
  if(['atk','hp','spd','iq','biq','ma'].includes(stepKey)) return SPIN_SPEED.stat;
  if(stepKey==='race')         return SPIN_SPEED.race;
  if(stepKey==='subrace')      return SPIN_SPEED.subrace;
  if(stepKey==='gear')         return SPIN_SPEED.gear;
  if(stepKey==='skill')        return SPIN_SPEED.skill;
  if(stepKey==='weapon_pick')  return SPIN_SPEED.weapon_pick;
  return SPIN_SPEED.fast; // gear_count, skill_count, weapon yes/no
}

let wheelDecay=0.9942; // current decay, set per spin

function animateWheel(){
  if(!wheelSpin) return;
  wheelVel*=wheelDecay;
  wheelAngle+=wheelVel;
  drawWheel(wheelSlices,wheelAngle);
  if(wheelVel<0.003){
    wheelSpin=false;
    const total = wheelSlices.reduce((s, x) => s + (parseFloat(x.weight) || 1), 0) || 1;
    let norm=(((-wheelAngle)%(Math.PI*2))+(Math.PI*2))%(Math.PI*2);
    let a=0,winner=wheelSlices[0];
    for(const s of wheelSlices){
      const theta=(s.weight/total)*Math.PI*2;
      if(norm>=a&&norm<a+theta){winner=s;break;}
      a+=theta;
    }
    document.getElementById('spinBtn').disabled=false;
    if(onSpinDone) onSpinDone(winner);
    return;
  }
  wheelAnimId=requestAnimationFrame(animateWheel);
}

function triggerWheelSpin(slices,cb,stepKey){
  wheelSlices=slices;
  const [vel,decay]=getSpeedTier(stepKey||spinState.stepKey);
  wheelVel=vel+Math.random()*0.06;
  wheelDecay=decay;
  wheelSpin=true;
  onSpinDone=cb;
  document.getElementById('spinBtn').disabled=true;
  animateWheel();
}

// ─── Step helpers ───────────────────────────────────
function makeStatSlices(tblKey,race){
  const tbl=GD.Stats[tblKey];
  // Try exact match, then substring match (for "Alien" vs "Alien (Cybernetic)" etc.)
  let k=Object.keys(tbl).find(x=>x.toLowerCase()===race.toLowerCase());
  if(!k) k=Object.keys(tbl).find(x=>x.toLowerCase().includes(race.toLowerCase()));
  if(!k) return [{item:1,weight:100,label:'1'}];
  return tbl[k].filter(s=>s.weight!==null&&s.weight>0)
    .map(s=>({item:s.level,weight:s.weight,label:String(s.level)}));
}

function getSubraceWheel(wheelName){
  // find in Subraces
  if(GD.Subraces[wheelName]) return GD.Subraces[wheelName].map(s=>({...s,label:s.item}));
  return null;
}

function updateStatPills(char){
  const el=document.getElementById('statPills');
  if(!char){el.innerHTML='';return;}
  const s=char.stats;
  const pairs=[['ATK',s.ATK],['HP',s.HP*10],['SPD',s.SPD],['IQ',s.IQ],['BIQ',s.BIQ],['MA',s.MA]];
  el.innerHTML=pairs.map(([k,v])=>
    `<div class="stat-pill">${k} <b>${v??'?'}</b></div>`
  ).join('');
}

const STEP_LABELS={
  race:'VÒNG QUAY TỘC',subrace:'VÒNG QUAY PHỤ TỘC',
  atk:'VÒNG QUAY ATK',hp:'VÒNG QUAY HP',spd:'VÒNG QUAY SPD',
  iq:'VÒNG QUAY IQ',biq:'VÒNG QUAY BIQ',ma:'VÒNG QUAY WEAPON MASTERY',
  gear_count:'SỐ LƯỢNG GEAR',gear:'VÒNG QUAY GEAR',
  skill_count:'SỐ LƯỢNG SKILL',skill:'VÒNG QUAY SKILL',
  weapon:'CÓ VŨ KHÍ KHÔNG?',weapon_pick:'CHỌN VŨ KHÍ',done:'HOÀN TẤT',
};

function advanceSpin(winner){
  const st=spinState;
  const char=st.char;
  let nextKey=null;

  if(st.stepKey==='race'){
    char.race=winner.race||winner.item;
    document.getElementById('spinRaceDisplay').textContent=char.race;
    // Special: Skeleton IQ fixed 1
    char._skeletonIQ=char.race.toLowerCase()==='skeleton';
    // Special: Alien or Undead Dragon can't have weapon
    char._alienNoWeapon=char.race.toLowerCase()==='alien';
    char._undeadNoWeapon=char.race.toLowerCase().includes('undead') && char.race.toLowerCase().includes('dragon');
    // Check subrace per race using alias map
    const raceInfo=GD.Races.find(r=>r.race===char.race);
    const subWheelName=(raceInfo?.subWheel||'').trim();
    const resolvedKey=resolveSubraceKey(subWheelName, GD.Subraces);
    if(resolvedKey && GD.Subraces[resolvedKey] && GD.Subraces[resolvedKey].length>0){
      char._subraceWheelName=resolvedKey;
      nextKey='subrace';
    } else {
      char.subrace=null;
      nextKey='atk';
    }
    setResult('TỘC',char.race,raceInfo?.trait||'');
  }
  else if(st.stepKey==='subrace'){
    char.subrace={name:winner.item,effect:winner.effect||''};
    setResult('PHỤ TỘC',winner.item,winner.effect||'');
    nextKey='atk';
  }
  else if(st.stepKey==='atk'){
    char.stats.ATK=winner.item;
    setResult('ATK',winner.item,'Sát thương mỗi đòn đánh');
    nextKey='hp';
  }
  else if(st.stepKey==='hp'){
    char.stats.HP=Math.max(1,winner.item);
    setResult('HP',winner.item*10,'('+winner.item+' base × 10)');
    nextKey='spd';
  }
  else if(st.stepKey==='spd'){
    char.stats.SPD=Math.max(1,winner.item);
    setResult('SPD',winner.item,'Tốc độ di chuyển & gia tốc');
    nextKey='iq';
  }
  else if(st.stepKey==='iq'){
    char.stats.IQ=char._skeletonIQ?1:Math.max(1,winner.item);
    setResult('IQ',char.stats.IQ,char._skeletonIQ?'Skeleton IQ cố định = 1':'Giảm CD skill');
    nextKey='biq';
  }
  else if(st.stepKey==='biq'){
    char.stats.BIQ=Math.max(1,winner.item);
    setResult('BIQ',winner.item,'Tốc độ vũ khí / parry');
    nextKey='ma';
  }
  else if(st.stepKey==='ma'){
    char.stats.MA=winner.item;
    setResult('MASTERY',winner.item,'Khai mở buff vũ khí');
    nextKey='gear_count';
  }
  else if(st.stepKey==='gear_count'){
    st.pendingGearCount=winner.gearCount||winner.item||0;
    char.gears=[];
    setResult('SỐ GEAR',st.pendingGearCount,st.pendingGearCount===0?'Không có gear':'Sẽ quay '+st.pendingGearCount+' gear');
    nextKey=st.pendingGearCount>0?'gear':'skill_count';
    if(st.pendingGearCount>0) st._gearLeft=st.pendingGearCount;
  }
  else if(st.stepKey==='gear'){
    char.gears.push({name:winner.item||winner.name,effect:winner.effect||'',type:winner.type||''});
    st._gearLeft--;
    setResult('GEAR',winner.item||winner.name,winner.effect||'');
    nextKey=st._gearLeft>0?'gear':'skill_count';
  }
  else if(st.stepKey==='skill_count'){
    st.pendingSkillCount=winner.skillCount??winner.item??0;
    char.skills=[];
    setResult('SỐ SKILL',st.pendingSkillCount,st.pendingSkillCount===0?'Không có skill':'Sẽ quay '+st.pendingSkillCount+' skill');
    nextKey=st.pendingSkillCount>0?'skill':'weapon';
    if(st.pendingSkillCount>0) st._skillLeft=st.pendingSkillCount;
    else st._skillLeft=0;
  }
  else if(st.stepKey==='skill'){
    char.skills.push({name:winner.item||winner.name,effect:winner.effect||''});
    st._skillLeft--;
    // remove from pool to avoid duplicates (handled via pool in loadStep)
    setResult('SKILL',winner.item||winner.name,winner.effect||'');
    nextKey=st._skillLeft>0?'skill':'weapon';
  }
  else if(st.stepKey==='weapon'){
    st.pendingWeapon=(winner.item==='Có');
    setResult(st.pendingWeapon?'CÓ VŨ KHÍ':'KHÔNG VŨ KHÍ',st.pendingWeapon?'✓':'✗','');
    nextKey=st.pendingWeapon&&!char._alienNoWeapon&&!char._undeadNoWeapon?'weapon_pick':'done';
  }
  else if(st.stepKey==='weapon_pick'){
    char.weapon={name:winner.item||winner.name,category:winner.category||'',milestones:winner.milestones||{},scale:winner.scale||''};
    setResult('VŨ KHÍ',char.weapon.name,'['+char.weapon.category+'] '+char.weapon.scale);
    nextKey='done';
  }

  if(nextKey==='done'||!nextKey){
    applyStatModifiers(char);
    updateStatPills(char);
    players[st.playerIdx]=char;
    updateSlot(st.playerIdx,char);
    document.getElementById('spinBtn').textContent='HOÀN TẤT ✓';
    document.getElementById('spinBtn').onclick=()=>{
      show('screen-select');
      checkFightReady();
    };
    document.getElementById('spinBtn').disabled=false;
    document.getElementById('spinStepLabel').textContent='HOÀN TẤT!';
    setResult('HOÀN TẤT','✓','Nhấn nút để quay về');
    drawWheel([],0);
    return;
  }

  st.stepKey=nextKey;
  document.getElementById('spinStepLabel').textContent=STEP_LABELS[nextKey]||nextKey.toUpperCase();
  loadStep();
}

function loadStep(){
  const st=spinState;
  const char=st.char;
  updateStatPills(char);

  let slices=[];

  if(st.stepKey==='race'){
    slices=GD.Races.map(r=>({...r,label:r.race,item:r.race}));
  }
  else if(st.stepKey==='subrace'){
    const wName=char._subraceWheelName||'';
    const w=(wName&&GD.Subraces[wName])||[];
    slices=w.length?w.map(s=>({...s,label:s.item})):[{item:'?',weight:1,label:'?'}];
  }
  else if(st.stepKey==='atk') slices=makeStatSlices('ATK',char.race);
  else if(st.stepKey==='hp')  slices=makeStatSlices('HP', char.race);
  else if(st.stepKey==='spd') slices=makeStatSlices('SPD',char.race);
  else if(st.stepKey==='iq')  slices=makeStatSlices('IQ', char.race);
  else if(st.stepKey==='biq') slices=makeStatSlices('BIQ',char.race);
  else if(st.stepKey==='ma')  slices=makeStatSlices('MA', char.race);
  else if(st.stepKey==='gear_count') slices=GD.GearWheel.map(g=>({...g,label:g.gearCount+'G'}));
  else if(st.stepKey==='gear'){
    const used=new Set(char.gears.map(g=>g.name));
    slices=GD.Gear.filter(g=>!used.has(g.name)).map(g=>({...g,label:g.name,item:g.name}));
  }
  else if(st.stepKey==='skill_count'){
    const k=Object.keys(GD.SkillWheel).find(x=>x.toLowerCase()===char.race.toLowerCase());
    slices=k?GD.SkillWheel[k].map(s=>({...s,label:s.skillCount+'S'})):[{skillCount:0,weight:100,label:'0S'}];
  }
  else if(st.stepKey==='skill'){
    const used=new Set(char.skills.map(s=>s.name));
    slices=GD.Skills.filter(s=>!used.has(s.name)).map(s=>({...s,label:s.name,item:s.name}));
  }
  else if(st.stepKey==='weapon') slices=GD.WeaponWheel.map(w=>({...w,label:w.item}));
  else if(st.stepKey==='weapon_pick') slices=GD.Weapons.filter(w=>_ok(w.name)).map(w=>({...w,label:w.name,item:w.name,weight:1}));

  if(!slices.length) slices=[{item:'?',weight:1,label:'?'}];
  wheelSlices=slices;

  // Ensure Cinzel font is loaded before drawing text on canvas
  const doDrawAndReady=()=>{
    drawWheel(slices,wheelAngle);
    document.getElementById('spinBtn').disabled=false;
    document.getElementById('spinBtn').textContent='✦ QUAY ✦';
    document.getElementById('spinBtn').onclick=doSpin;
  };

  if(document.fonts && document.fonts.load){
    document.fonts.load('700 12px Cinzel').then(doDrawAndReady).catch(doDrawAndReady);
  } else {
    doDrawAndReady();
  }
}

function doSpin(){
  triggerWheelSpin(wheelSlices,advanceSpin,spinState.stepKey);
}

function setResult(label,val,sub){
  document.getElementById('resultLabel').textContent=label;
  document.getElementById('resultValue').textContent=val;
  document.getElementById('resultSub').textContent=sub;
}

function pickWeighted(slices){
  if(!slices.length) return null;
  const total = slices.reduce((sum, x) => sum + Math.max(0.01, parseFloat(x.weight)), 0);
  let r = Math.random() * total;
  for(const s of slices){
    r -= Math.max(0.01, parseFloat(s.weight));
    if(r <= 0) return s;
  }
  return slices[slices.length-1];
}

function autoGenCharacter(playerIdx){
  if (!GD) {
    showToast('❌ Dữ liệu chưa nạp xong. Vui lòng chờ...');
    return;
  }
  const char={
    race:'',
    subrace:null,
    stats:{ATK:1,HP:1,SPD:1,IQ:1,BIQ:1,MA:1},
    skills:[],
    gears:[],
    weapon:null,
    _gearPool:[...GD.Gear],
    _skillPool:[...GD.Skills],
    _skeletonIQ:false,
    _alienNoWeapon:false,
    _undeadNoWeapon:false,
  };
  
  // 1. Race
  const raceSlice = pickWeighted(GD.Races.map(r => ({...r, weight: r.weight || 10, item: r.race, label: r.race})));
  char.race = raceSlice.race || raceSlice.item;
  
  // 2. Check special flags
  char._skeletonIQ = char.race.toLowerCase() === 'skeleton';
  char._alienNoWeapon = char.race.toLowerCase() === 'alien';
  char._undeadNoWeapon = char.race.toLowerCase().includes('undead') && char.race.toLowerCase().includes('dragon');
  
  // 3. Subrace
  const raceInfo = GD.Races.find(r => r.race === char.race);
  const subWheelName = (raceInfo?.subWheel || '').trim();
  if(subWheelName){
    const resolvedKey = resolveSubraceKey(subWheelName, GD.Subraces);
    if(resolvedKey && GD.Subraces[resolvedKey] && GD.Subraces[resolvedKey].length > 0){
      const subSlice = pickWeighted(GD.Subraces[resolvedKey]);
      char.subrace = {name: subSlice.item, effect: subSlice.effect || ''};
    }
  }
  
  // 4. Stats
  const statKeys = ['ATK','HP','SPD','IQ','BIQ','MA'];
  for(const key of statKeys){
    const statSlices = makeStatSlices(key, char.race);
    const statWinner = pickWeighted(statSlices);
    char.stats[key] = parseInt(statWinner.item || statWinner.level) || 1;
  }
  if(char._skeletonIQ) char.stats.IQ = 1; // Fix IQ for skeleton
  
  // 5. Gear count + gears
  const gearCountSlice = pickWeighted(GD.GearWheel);
  const gearCount = parseInt(gearCountSlice.gearCount || 0);
  for(let i = 0; i < gearCount && char._gearPool.length > 0; i++){
    const gIdx = Math.floor(Math.random() * char._gearPool.length);
    char.gears.push(char._gearPool.splice(gIdx, 1)[0]);
  }
  
  // 6. Skill count + skills
  const skillWheelKey = Object.keys(GD.SkillWheel).find(x => x.toLowerCase() === char.race.toLowerCase());
  let skillSlices = skillWheelKey ? GD.SkillWheel[skillWheelKey] : [{skillCount:0,weight:100}];
  const skillCountSlice = pickWeighted(skillSlices);
  const skillCount = parseInt(skillCountSlice.skillCount || 0);
  for(let i = 0; i < skillCount && char._skillPool.length > 0; i++){
    const sIdx = Math.floor(Math.random() * char._skillPool.length);
    char.skills.push(char._skillPool.splice(sIdx, 1)[0]);
  }
  
  // 7. Weapon
  if(!char._alienNoWeapon && !char._undeadNoWeapon){
    const weaponWheelSlice = pickWeighted(GD.WeaponWheel);
    const wantsWeapon = (weaponWheelSlice.item || weaponWheelSlice.weapon || '').toLowerCase() === 'có';
    if(wantsWeapon && GD.Weapons.length > 0){
      const weaponPick = pickWeighted(GD.Weapons.map(w => ({...w, weight: w.weight || 1, item: w.name, label: w.name})));
      char.weapon = {
        name: weaponPick.name,
        category: weaponPick.category || '',
        milestones: weaponPick.milestones || {},
        scale: weaponPick.scale || ''
      };
    }
  }
  
  // Apply modifiers
  applyStatModifiers(char);
  
  // Save to players
  players[playerIdx] = char;
  updateSlot(playerIdx, char);
  checkFightReady();
  
  showToast(`✅ Đã tạo ${char.race} cho Player ${playerIdx+1} tự động!`);
}

// ══════════════════════════════════════════════════════
//  COMBAT CONSTANTS & CATEGORIES
// ══════════════════════════════════════════════════════
const HP_MULT = 10;
const CAT = {
  SWORD: 'sword', DAGGER: 'dagger', POLEARM: 'polearms',
  BOW: 'bow/crossbow', FIREARM: 'firearm', MAGIC: 'magic',
  SPECIAL: 'special', UNARMED: 'unarmed',
};

const WEAPON_SCALE = {
  [CAT.SWORD]: {
    label: '⚔ Sword', projectile: false,
    onHit(a, _d, log) { a.ATK++; addLog(`  ↑ Sword: ${a.name} ATK→${a.ATK}`, 'log-event'); }
  },
  [CAT.DAGGER]: {
    label: '🗡 Dagger', projectile: false,
    onHit(a, _d, log) { a.BIQ = Math.min(a.BIQ + 1, 20); addLog(`  ↑ Dagger: ${a.name} BIQ→${a.BIQ}`, 'log-event'); }
  },
  [CAT.POLEARM]: {
    label: '🏹 Polearm', projectile: false,
    onHit(a, _d, log) {
      a._polearmAccum = (a._polearmAccum || 0) + 0.5;
      if (a._polearmAccum >= 1) {
        const b = Math.floor(a._polearmAccum); a.ATK += b; a._polearmAccum -= b;
        addLog(`  ↑ Polearm: ${a.name} ATK→${a.ATK}`, 'log-event');
      }
    }
  },
  [CAT.BOW]: {
    label: '🏹 Bow', projectile: true, travelTime: 0.1, // Way faster!
    onHit(a, _d, log) { a._bowExtraShots = (a._bowExtraShots || 0) + 1; addLog(`  ↑ Bow: extra shots→${a._bowExtraShots}`, 'log-event'); }
  },
  [CAT.FIREARM]: {
    label: '🔫 Firearm', projectile: true, travelTime: 0.05, // Super fast!
    onHit(a, _d, log) {
      a.ATK++; a._firearmSpeedMult = Math.max(0.4, (a._firearmSpeedMult || 1) * 0.92);
      addLog(`  ↑ Firearm: ${a.name} ATK→${a.ATK}`, 'log-event');
    }
  },
  [CAT.MAGIC]: {
    label: '🔮 Magic', projectile: true, travelTime: 0.15, // Faster!
    onHit(a, _d, log) { a.BIQ = Math.min(a.BIQ + 1, 20); addLog(`  ↑ Magic: ${a.name} BIQ→${a.BIQ}`, 'log-event'); }
  },
  [CAT.UNARMED]: { label: '✊ Unarmed', projectile: false, onHit() { } },
  [CAT.SPECIAL]: { label: '✨ Special', projectile: false, onHit() { } },
};

function resolveCategory(weapon) {
  if (!weapon) return CAT.UNARMED;
  const raw = (weapon.category || '').toLowerCase().trim();
  if (raw.includes('sword')) return CAT.SWORD;
  if (raw.includes('dagger')) return CAT.DAGGER;
  if (raw.includes('polearm')) return CAT.POLEARM;
  if (raw.includes('bow')) return CAT.BOW;
  if (raw.includes('firearm')) return CAT.FIREARM;
  if (raw.includes('magic')) return CAT.MAGIC;
  return CAT.SPECIAL;
}

// ══════════════════════════════════════════════════════
//  HOOK SYSTEM
// ══════════════════════════════════════════════════════
function makeHooks() {
  return { onTick: [], onTakeDamage: [], onDealDamage: [], onParry: [] };
}
function addHook(hooks, type, id, fn) {
  if (!hooks[type].find(h => h.id === id)) hooks[type].push({ id, fn });
}
function fireTick(f, opp, dt, t) {
  f.hooks.onTick.forEach(h => h.fn(f, opp, dt, t));
}
function fireTakeDamage(def, att, rawDmg) {
  let dmg = rawDmg, cancelled = false;
  for (const h of def.hooks.onTakeDamage) {
    const res = h.fn(def, att, dmg);
    if (res) {
      if (res.dmg !== undefined) dmg = res.dmg;
      if (res.cancel) { cancelled = true; break; }
    }
  }
  return { finalDmg: Math.max(0, dmg), cancelled };
}
function fireDealDamage(att, def, rawDmg) {
  let dmg = rawDmg;
  for (const h of att.hooks.onDealDamage) {
    const res = h.fn(att, def, dmg);
    if (res && res.dmg !== undefined) dmg = res.dmg;
  }
  return Math.max(0, dmg);
}
function fireParry(def, att) {
  def.hooks.onParry.forEach(h => h.fn(def, att));
}

function buildHooks(f) {
  f.hooks = makeHooks();
  const sk = name => f.char.skills.some(s => s.name === name);
  const gr = name => f.char.gears.some(g => g.name === name);

  // Example hooks (mirroring startCombat.js logic)
  if (sk('Earth-Quake')) {
    f._eqTimer = 0;
    addHook(f.hooks, 'onTick', 'earthquake', (f, opp, dt, t) => {
      f._eqTimer += dt;
      if (f._eqTimer >= 10) {
        f._eqTimer -= 10;
        opp.stunTimer = Math.max(opp.stunTimer || 0, 1);
        addLog(`[Earth-Quake] ${f.name} rung chuyển sân! ${opp.name} bất động 1s`, 'log-event');
      }
    });
  }

  if (sk('Incineration')) {
    f._incinerTimer = 0;
    addHook(f.hooks, 'onTick', 'incineration', (f, opp, dt, t) => {
      f._incinerTimer += dt;
      if (f._incinerTimer >= 10) {
        f._incinerTimer -= 10;
        const dmg = 5 * HP_MULT;
        opp.curHp = Math.max(0, opp.curHp - dmg);
        addLog(`[Incineration] ${f.name} tạo vòng lửa gây ${dmg} HP`, 'log-event');
      }
    });
  }

  if (gr('Steroid')) {
    addHook(f.hooks, 'onTick', 'steroid', (f, opp, dt, t) => {
      if (Math.floor(t) !== Math.floor(t - dt)) {
        const drain = Math.ceil(f.maxHp * 0.01);
        f.curHp = Math.max(1, f.curHp - drain);
      }
    });
  }

  if (gr('Determined Investor')) {
    f._deterTimer = 0;
    addHook(f.hooks, 'onTick', 'deter', (f, opp, dt, t) => {
      f._deterTimer += dt;
      if (f._deterTimer >= 10) {
        f._deterTimer = 0; f.ATK++; f.SPD++;
        addLog(`[Determined Investor] ${f.name} +1 ATK, +1 SPD`, 'log-event');
      }
    });
    addHook(f.hooks, 'onTakeDamage', 'deter_reset', (f) => { f._deterTimer = 0; });
  }

  if (sk('Phasing')) {
    f._phasingTimer = 0;
    addHook(f.hooks, 'onTick', 'phasing_tick', (f, opp, dt) => { if (f._phasingTimer > 0) f._phasingTimer -= dt; });
    addHook(f.hooks, 'onTakeDamage', 'phasing_block', (f) => {
      if (f._phasingTimer > 0) { addLog(`[Phasing] ${f.name} né sát thương!`, 'log-parry'); return { cancel: true }; }
      f._phasingTimer = 0.5;
    });
  }

  if (sk('Frost Armor')) {
    addHook(f.hooks, 'onTakeDamage', 'frost_armor', (f, att) => {
      f.curHp = Math.min(f.maxHp, f.curHp + 2 * HP_MULT);
      att.SPD = Math.max(1, att.SPD - 1);
      addLog(`[Frost Armor] ${f.name} +20 HP, ${att.name} -1 SPD`, 'log-event');
    });
  }

  if (sk('Bloody Strike')) {
    addHook(f.hooks, 'onDealDamage', 'bloody', (f, def, dmg) => {
      if (Math.random() < 0.5) {
        f.curHp = Math.max(1, f.curHp - 3 * HP_MULT);
        addLog(`[Bloody Strike] ${f.name} hiến tế HP!`, 'log-event');
        return { dmg: dmg + 6 * HP_MULT };
      }
    });
  }

  if (sk('Critical Strike')) {
    f._critStacks = 0;
    addHook(f.hooks, 'onDealDamage', 'crit', (f, def, dmg) => {
      if (Math.random() < 0.2 + f._critStacks * 0.05) {
        if (f._critStacks < 5) f._critStacks++;
        addLog(`[Critical Strike] CRIT!`, 'log-event');
        return { dmg: dmg * 1.5 };
      }
    });
  }

  if (sk('Evasion')) {
    f._evasionStacks = 0;
    addHook(f.hooks, 'onDealDamage', 'evasion_hit', (f) => { if (f._evasionStacks < 6) f._evasionStacks++; });
    addHook(f.hooks, 'onParry', 'evasion_parry', (f) => { if (f._evasionStacks < 6) f._evasionStacks++; });
    // Use evasion stacks for parry rate check in dealDamage
  }

  if (sk('Bash')) {
    addHook(f.hooks, 'onParry', 'bash', (f, att) => {
      att.stunTimer = Math.max(att.stunTimer || 0, 3);
      addLog(`[Bash] ${f.name} gây choáng 3s!`, 'log-event');
    });
  }
}
